<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanita BC-730 體組成管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#090e1d; --bg2:#0d1525; --card:rgba(255,255,255,0.035);
  --border:rgba(255,255,255,0.08); --teal:#4ECDC4; --yellow:#FFE66D;
  --red:#FF6B6B; --green:#A8E6CF; --purple:#C3B1E1; --orange:#FFB347;
  --blue:#87CEEB; --pink:#DDA0DD; --cyan:#00CED1; --text:#e8eaf6; --muted:#6b7280;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);min-height:100vh;font-family:'DM Sans','Noto Sans TC',sans-serif;color:var(--text);padding-bottom:90px;}
/* HEADER */
header{background:rgba(255,255,255,0.025);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
.logo-sub{font-size:10px;color:var(--teal);letter-spacing:3px;text-transform:uppercase;font-weight:500;}
.logo-main{font-size:20px;font-weight:700;letter-spacing:-0.5px;}
/* NAV */
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(9,14,29,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:200;}
.nav-btn{flex:1;padding:12px 4px 10px;background:none;border:none;color:var(--muted);font-family:inherit;font-size:10px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color 0.2s;}
.nav-btn .nav-icon{font-size:20px;}
.nav-btn.active{color:var(--teal);}
/* VIEWS */
.view{display:none;padding:20px 16px;}
.view.active{display:block;}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:14px;}
/* CHIPS */
.member-chips{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.chip{padding:10px 16px;border-radius:14px;cursor:pointer;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#bbb;font-size:14px;transition:all 0.2s;font-family:inherit;}
.chip.active{background:linear-gradient(135deg,#4ECDC4,#44A8A0);border:none;color:#fff;font-weight:700;}
.chip.add{border:1px dashed rgba(78,205,196,0.4);color:var(--teal);font-weight:500;background:none;}
/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stat-cell{background:rgba(255,255,255,0.04);border-radius:12px;padding:12px 10px;}
.stat-label{font-size:10px;color:var(--muted);margin-bottom:2px;}
.stat-value{font-size:17px;font-weight:700;}
.stat-unit{font-size:10px;font-weight:400;color:#555;margin-left:2px;}
.stat-delta{font-size:10px;margin-top:2px;}

/* BUTTONS */
.btn{border:none;border-radius:12px;padding:10px 16px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:opacity 0.2s;}
.btn-teal{background:rgba(78,205,196,0.15);border:1px solid rgba(78,205,196,0.35);color:var(--teal);}
.btn-yellow{background:rgba(255,230,109,0.15);border:1px solid rgba(255,230,109,0.35);color:var(--yellow);}
.btn-red{background:rgba(255,107,107,0.15);border:1px solid rgba(255,107,107,0.35);color:var(--red);}
.btn-purple{background:rgba(195,177,225,0.15);border:1px solid rgba(195,177,225,0.35);color:var(--purple);}
.btn-green{background:rgba(168,230,207,0.15);border:1px solid rgba(168,230,207,0.35);color:var(--green);}
.btn-full{display:block;width:100%;padding:14px 20px;border-radius:14px;font-size:15px;font-weight:700;text-align:center;}
.btn-primary{background:linear-gradient(135deg,var(--teal),#44a8a0);color:#0a0f1e;}
.btn-danger{background:linear-gradient(135deg,var(--red),#d44);color:#fff;}
.btn-ghost{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#ccc;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn-row{display:flex;gap:10px;margin-top:10px;}
/* BACK BAR */
.back-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.back-bar h2{font-size:18px;font-weight:700;}
/* FORM */
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;padding-left:2px;}
.field input,.field select{width:100%;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--text);font-size:16px;font-family:inherit;outline:none;}
.field input:focus{border-color:rgba(78,205,196,0.5);}
.section-label{font-size:11px;color:var(--teal);letter-spacing:2px;text-transform:uppercase;margin:14px 0 8px 2px;}
/* GENDER */
.gender-toggle{display:flex;gap:10px;}
.gender-btn{flex:1;padding:12px;text-align:center;border-radius:12px;cursor:pointer;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#aaa;font-weight:500;font-family:inherit;font-size:15px;transition:all 0.2s;}
.gender-btn.active{background:rgba(78,205,196,0.15);border-color:var(--teal);color:var(--teal);}
/* METRIC PILLS */
.metric-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.metric-pill{padding:8px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:none;font-family:inherit;font-weight:400;color:#aaa;background:rgba(255,255,255,0.06);transition:all 0.2s;}
.metric-pill.active{font-weight:700;}
/* CHART */
.chart-wrap{position:relative;height:220px;margin:10px 0;}
/* RECORD ITEM */
.record-item{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;}
.record-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.record-date{font-size:14px;font-weight:600;color:var(--teal);}
.record-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.record-metric{font-size:12px;}
.record-metric span{color:var(--muted);}
/* EMPTY */
.empty{text-align:center;padding:50px 20px;}
.empty p{color:var(--muted);font-size:14px;margin-bottom:20px;}
/* LEGEND */
.legend{display:flex;gap:14px;padding:4px 0;margin-top:6px;flex-wrap:wrap;}
.legend span{font-size:11px;}
/* TOP ROW */
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.top-row .actions{display:flex;gap:8px;flex-wrap:wrap;}
.no-trend{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px;}
/* SCORE */
.score-ring{display:flex;align-items:center;gap:20px;padding:10px 0;}
.score-num{font-size:52px;font-weight:700;line-height:1;}
.score-label{font-size:12px;color:var(--muted);}
.score-desc{font-size:14px;margin-top:4px;font-weight:500;}
/* COMPARE */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.compare-member{padding:10px 14px;border-radius:12px;cursor:pointer;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);font-size:13px;color:#aaa;font-family:inherit;transition:all 0.2s;text-align:center;}
.compare-member.sel-a{background:rgba(78,205,196,0.15);border-color:var(--teal);color:var(--teal);font-weight:600;}
.compare-member.sel-b{background:rgba(255,230,109,0.15);border-color:var(--yellow);color:var(--yellow);font-weight:600;}
/* ANALYSIS BARS */
.analysis-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.analysis-label{font-size:12px;color:#aaa;width:56px;flex-shrink:0;}
.analysis-bar-wrap{flex:1;}
.analysis-bar{height:8px;border-radius:4px;transition:width 0.6s;}
.analysis-val{font-size:12px;font-weight:600;width:52px;text-align:right;flex-shrink:0;}
/* BADGE */
.badge{display:inline-block;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:600;}
.badge-ok{background:rgba(78,205,196,0.15);color:var(--teal);}
.badge-warn{background:rgba(255,179,71,0.15);color:var(--orange);}
.badge-bad{background:rgba(255,107,107,0.15);color:var(--red);}
/* DATA MGMT */
.mgmt-item{display:flex;align-items:center;justify-content:space-between;padding:16px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;}
.mgmt-info{flex:1;}
.mgmt-title{font-size:14px;font-weight:600;margin-bottom:2px;}
.mgmt-desc{font-size:12px;color:var(--muted);}
/* TARGET */
.target-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.target-key{font-size:13px;color:#aaa;width:60px;flex-shrink:0;}
.target-input{flex:1;padding:8px 12px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--text);font-size:14px;font-family:inherit;outline:none;}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-sub">TANITA BC-730</div>
    <div class="logo-main">體組成管理</div>
  </div>
  <div id="headerRight" style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);" id="recordCount"></div>
</header>

<!-- NAV -->
<nav>
  <button class="nav-btn active" id="nav-dashboard" onclick="switchNav('dashboard')"><span class="nav-icon">🏠</span>首頁</button>
  <button class="nav-btn" id="nav-analysis" onclick="switchNav('analysis')"><span class="nav-icon">📊</span>分析</button>
  <button class="nav-btn" id="nav-trend" onclick="switchNav('trend')"><span class="nav-icon">📈</span>趨勢</button>
  <button class="nav-btn" id="nav-compare" onclick="switchNav('compare')"><span class="nav-icon">👥</span>對比</button>
  <button class="nav-btn" id="nav-data" onclick="switchNav('data')"><span class="nav-icon">💾</span>資料</button>
</nav>

<!-- DASHBOARD -->
<div class="view active" id="view-dashboard">
  <div class="member-chips" id="memberChips"></div>
  <div id="dashContent"></div>
</div>

<!-- ANALYSIS -->
<div class="view" id="view-analysis">
  <div style="font-size:18px;font-weight:700;margin-bottom:16px">健康分析</div>
  <div class="member-chips" id="analysisChips"></div>
  <div id="analysisContent"></div>
</div>

<!-- TREND -->
<div class="view" id="view-trend">
  <div style="font-size:18px;font-weight:700;margin-bottom:16px" id="trendTitle">趨勢圖</div>
  <div class="member-chips" id="trendChips"></div>
  <div class="metric-pills" id="metricPills"></div>
  <div id="compareToggleWrap" style="margin-bottom:12px;display:none">
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#aaa;cursor:pointer">
      <input type="checkbox" id="showAllToggle" onchange="renderTrend()" style="accent-color:var(--teal)">
      顯示所有成員對比
    </label>
  </div>
  <div class="card" id="trendCard"><div class="no-trend">選擇成員後顯示趨勢圖</div></div>
</div>

<!-- COMPARE -->
<div class="view" id="view-compare">
  <div style="font-size:18px;font-weight:700;margin-bottom:6px">成員對比</div>
  <div style="font-size:13px;color:var(--muted);margin-bottom:16px">選擇兩位成員，比較同一指標</div>
  <div id="compareContent"></div>
</div>

<!-- DATA MANAGEMENT -->
<div class="view" id="view-data">
  <div style="font-size:18px;font-weight:700;margin-bottom:16px">資料管理</div>

  <div class="mgmt-item">
    <div class="mgmt-info">
      <div class="mgmt-title">📥 匯出 CSV</div>
      <div class="mgmt-desc">下載所有量測紀錄為試算表格式</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-teal" onclick="exportCSV('current')">目前成員</button>
      <button class="btn btn-ghost" onclick="exportCSV('all')">全部成員</button>
    </div>
  </div>

  <div class="mgmt-item">
    <div class="mgmt-info">
      <div class="mgmt-title">💾 備份資料</div>
      <div class="mgmt-desc">匯出 JSON 備份檔，可於其他裝置還原</div>
    </div>
    <button class="btn btn-purple" onclick="exportJSON()">匯出備份</button>
  </div>

  <div class="mgmt-item">
    <div class="mgmt-info">
      <div class="mgmt-title">📤 還原資料</div>
      <div class="mgmt-desc">從備份 JSON 還原（會覆蓋現有資料）</div>
    </div>
    <button class="btn btn-yellow" onclick="document.getElementById('importFile').click()">選擇檔案</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>

  <div class="mgmt-item">
    <div class="mgmt-info">
      <div class="mgmt-title">🎯 目標設定</div>
      <div class="mgmt-desc">為每位成員設定體重、體脂率目標</div>
    </div>
    <button class="btn btn-green" onclick="goTargets()">設定</button>
  </div>

  <div class="mgmt-item" style="border-color:rgba(255,107,107,0.2)">
    <div class="mgmt-info">
      <div class="mgmt-title" style="color:var(--red)">🗑 清除所有資料</div>
      <div class="mgmt-desc">刪除所有成員與量測紀錄</div>
    </div>
    <button class="btn btn-red" onclick="clearAll()">清除</button>
  </div>

  <div style="margin-top:20px;padding:16px;background:rgba(255,255,255,0.02);border-radius:14px;border:1px solid var(--border)">
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">儲存狀態</div>
    <div id="storageInfo" style="font-size:13px;color:#aaa"></div>
  </div>
</div>

<!-- RECORDS (sub-view) -->
<div class="view" id="view-records">
  <div class="back-bar" style="justify-content:space-between">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="btn btn-ghost" onclick="switchNav('dashboard')">← 返回</button>
      <h2 id="recordsTitle">量測紀錄</h2>
    </div>
    <button class="btn btn-teal" onclick="goAddRecord()">＋ 新增</button>
  </div>
  <div id="recordsList"></div>
</div>

<!-- ADD RECORD (sub-view) -->
<div class="view" id="view-addRecord">
  <div class="back-bar">
    <button class="btn btn-ghost" onclick="showView('records')">← 返回</button>
    <h2>新增量測</h2>
  </div>
  <div class="field"><label>日期</label><input type="date" id="recDate"></div>
  <div class="section-label">主要指數</div>
  <div id="mainFields"></div>
  <div style="margin-top:14px"><button class="btn btn-full btn-primary" onclick="saveRecord()">儲存紀錄</button></div>
</div>

<!-- ADD/EDIT MEMBER (sub-view) -->
<div class="view" id="view-addMember">
  <div class="back-bar">
    <button class="btn btn-ghost" onclick="switchNav('dashboard')">← 返回</button>
    <h2 id="memberFormTitle">新增成員</h2>
  </div>
  <div class="field"><label>姓名</label><input type="text" id="mName" placeholder="請輸入姓名"></div>
  <div class="field"><label>性別</label>
    <div class="gender-toggle">
      <button class="gender-btn active" id="gBtn男" onclick="selectGender('男')">男</button>
      <button class="gender-btn" id="gBtn女" onclick="selectGender('女')">女</button>
    </div>
  </div>
  <div class="field"><label>出生年</label><input type="number" id="mBirth" value="1990" min="1920" max="2020"></div>
  <div class="field"><label>身高 (cm)</label><input type="number" id="mHeight" value="170" min="50" max="250"></div>
  <div class="btn-row">
    <button class="btn btn-full btn-primary" id="saveMemberBtn" onclick="saveMember()">建立成員</button>
    <button class="btn btn-full btn-danger" id="deleteMemberBtn" onclick="deleteMember()" style="display:none;flex:0 0 auto;width:auto;padding:14px 20px">刪除</button>
  </div>
</div>

<!-- TARGETS (sub-view) -->
<div class="view" id="view-targets">
  <div class="back-bar">
    <button class="btn btn-ghost" onclick="showView('data')">← 返回</button>
    <h2>目標設定</h2>
  </div>
  <div id="targetsContent"></div>
</div>

<script>
const METRICS = [
  {key:"weight",     label:"體重",     unit:"kg",   color:"#4ECDC4", normal:[50,80],    goalable:true },
  {key:"bmi",        label:"BMI",      unit:"",     color:"#FFE66D", normal:[18.5,24.9],goalable:false},
  {key:"bodyFat",    label:"體脂率",   unit:"%",    color:"#FF6B6B", normal:[10,25],    goalable:true },
  {key:"muscleMass", label:"肌肉量",   unit:"kg",   color:"#A8E6CF", normal:[30,60],    goalable:true },
  {key:"boneMass",   label:"骨量",     unit:"kg",   color:"#C3B1E1", normal:[2,3.5],    goalable:false},
  {key:"visceralFat",label:"內臟脂肪", unit:"級",   color:"#FFB347", normal:[1,9],      goalable:false},
  {key:"bmr",        label:"基礎代謝", unit:"kcal", color:"#87CEEB", normal:[1200,2000],goalable:false},
  {key:"bodyAge",    label:"身體年齡", unit:"歲",   color:"#DDA0DD", normal:[20,40],    goalable:false},
  {key:"waterContent",label:"身體水分",unit:"%",   color:"#00CED1", normal:[45,65],    goalable:false},
];
const SEGMENTS = [];

// ── STATE ──
let state = {members:[], records:{}, targets:{}};
let currentMemberId = null;
let currentGender = '男';
let editingMemberId = null;
let activeMetric = 'weight';
let compareA = null, compareB = null;
let trendChart = null, compareChart = null;
let currentNav = 'dashboard';

function loadState(){
  try{const s=localStorage.getItem('tanita730v2');if(s)state=JSON.parse(s);}catch{}
}
function saveState(){
  try{localStorage.setItem('tanita730v2',JSON.stringify(state));}catch{}
}
function uid(){return Math.random().toString(36).slice(2,10);}
function currentMember(){return state.members.find(m=>m.id===currentMemberId)||null;}
function getMemberRecords(id){return(state.records[id]||[]).sort((a,b)=>a.date.localeCompare(b.date));}
function currentRecords(){return getMemberRecords(currentMemberId);}

// ── NAV ──
function switchNav(name){
  currentNav = name;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const viewEl = document.getElementById('view-'+name);
  if(viewEl) viewEl.classList.add('active');
  const navEl = document.getElementById('nav-'+name);
  if(navEl) navEl.classList.add('active');
  if(name==='dashboard') renderDashboard();
  if(name==='analysis') renderAnalysis();
  if(name==='trend') renderTrend();
  if(name==='compare') renderCompare();
  if(name==='data') renderData();
}
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
}

// ── DASHBOARD ──
function renderDashboard(){
  renderMemberChips('memberChips', id=>{currentMemberId=id;renderDashboard();});
  renderDashContent();
  updateStorageInfo();
}

function renderMemberChips(elId, onSelect){
  const el=document.getElementById(elId);
  let html=state.members.map(m=>`
    <button class="chip ${m.id===currentMemberId?'active':''}" onclick="(${onSelect.toString()})('${m.id}')">${m.name}</button>
  `).join('');
  html+=`<button class="chip add" onclick="goAddMember()">+ 新增</button>`;
  el.innerHTML=html;
}

function renderDashContent(){
  const el=document.getElementById('dashContent');
  if(!currentMemberId){
    el.innerHTML=state.members.length===0
      ?`<div class="empty"><div style="font-size:56px;margin-bottom:12px">🧬</div><div style="font-size:20px;font-weight:700;margin-bottom:8px">開始記錄健康數據</div><p>新增家庭成員，追蹤每次 Tanita 的量測結果</p><button class="btn btn-full btn-primary" style="max-width:260px;margin:0 auto" onclick="goAddMember()">＋ 新增第一位成員</button></div>`
      :`<div class="empty"><p>請選擇上方成員</p></div>`;
    return;
  }
  const recs=currentRecords();
  const latest=recs.length?recs[recs.length-1]:null;
  const prev=recs.length>1?recs[recs.length-2]:null;
  const targets=state.targets[currentMemberId]||{};
  let html='';

  if(!latest){
    html+=`<div class="card" style="text-align:center;padding:40px;border-style:dashed;border-color:rgba(78,205,196,0.3)"><div style="font-size:40px;margin-bottom:10px">📊</div><div style="color:var(--muted);font-size:14px">尚無量測紀錄</div></div>`;
  } else {
    // Score
    const score=calcScore(latest);
    const scoreColor=score>=80?'#4ECDC4':score>=60?'#FFE66D':'#FF6B6B';
    const scoreLabel=score>=80?'優良 💪':score>=60?'尚可 📈':'需改善 ⚠️';
    html+=`<div class="card">
      <div class="top-row">
        <div>
          <div style="font-size:13px;color:var(--muted)">最新紀錄</div>
          <div style="font-size:12px;color:var(--teal)">${latest.date}</div>
        </div>
        <div class="actions">
          <button class="btn btn-teal" onclick="goViewRecords()">紀錄</button>
          <button class="btn btn-ghost" onclick="goEditMember()">✏️</button>
        </div>
      </div>
      <div class="score-ring">
        <div>
          <div class="score-num" style="color:${scoreColor}">${score}</div>
          <div class="score-label">健康評分 / 100</div>
        </div>
        <div>
          <div class="score-desc" style="color:${scoreColor}">${scoreLabel}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:4px">依 BC-730 九項指數計算</div>
        </div>
      </div>
    </div>`;

    // Stats grid with delta
    html+=`<div class="card">
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">量測數值</div>
      <div class="stat-grid">
        ${METRICS.map(m=>{
          const val=latest[m.key];
          const pval=prev?.[m.key];
          const delta=val&&pval?(parseFloat(val)-parseFloat(pval)):null;
          const deltaStr=delta!=null?`<div class="stat-delta" style="color:${delta>0?'#FF6B6B':delta<0?'#4ECDC4':'#666'}">${delta>0?'▲':'▼'} ${Math.abs(delta).toFixed(1)}${m.unit}</div>`:'';
          const goalVal=targets[m.key];
          const goalStr=goalVal?`<div style="font-size:10px;color:#666;margin-top:2px">目標 ${goalVal}${m.unit}</div>`:'';
          return `<div class="stat-cell" style="border:1px solid ${m.color}22">
            <div class="stat-label">${m.label}</div>
            <div class="stat-value" style="color:${m.color}">${val||'—'}<span class="stat-unit">${m.unit}</span></div>
            ${deltaStr}${goalStr}
          </div>`;
        }).join('')}
      </div>
    </div>`;



    // Goal progress
    const goalKeys=METRICS.filter(m=>m.goalable&&targets[m.key]&&latest[m.key]);
    if(goalKeys.length){
      html+=`<div class="card">
        <div style="font-size:13px;color:var(--muted);margin-bottom:12px">目標進度</div>
        ${goalKeys.map(m=>{
          const cur=parseFloat(latest[m.key]);
          const goal=parseFloat(targets[m.key]);
          const first=getMemberRecords(currentMemberId).find(r=>r[m.key]);
          const start=first?parseFloat(first[m.key]):cur;
          const total=Math.abs(goal-start)||1;
          const progress=Math.min(100,Math.max(0,Math.abs(cur-start)/total*100));
          return `<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
              <span style="color:#aaa">${m.label}</span>
              <span style="color:${m.color}">${cur}${m.unit} → 目標 ${goal}${m.unit}</span>
            </div>
            <div class="seg-track" style="height:8px"><div class="seg-fill" style="width:${progress}%;background:${m.color}"></div></div>
          </div>`;
        }).join('')}
      </div>`;
    }
  }

  html+=`<button class="btn btn-full btn-primary" onclick="goAddRecord()">＋ 新增量測</button>`;
  el.innerHTML=html;
}

// ── HEALTH SCORE ──
function calcScore(rec){
  let total=0,count=0;
  const checks=[
    {key:'bmi',     lo:18.5,hi:24.9},
    {key:'bodyFat', lo:10,  hi:25  },
    {key:'visceralFat',lo:1,hi:9   },
    {key:'waterContent',lo:45,hi:65},
  ];
  checks.forEach(c=>{
    const v=parseFloat(rec[c.key]);if(!v)return;
    const inRange=v>=c.lo&&v<=c.hi;
    const borderline=(v>=c.lo*0.9&&v<=c.hi*1.1);
    total+=inRange?100:borderline?60:20;count++;
  });
  return count?Math.round(total/count):0;
}

// ── ANALYSIS ──
function renderAnalysis(){
  const chips=document.getElementById('analysisChips');
  let html=state.members.map(m=>`
    <button class="chip ${m.id===currentMemberId?'active':''}" onclick="currentMemberId='${m.id}';renderAnalysis()">${m.name}</button>
  `).join('');
  html+=`<button class="chip add" onclick="goAddMember()">+ 新增</button>`;
  chips.innerHTML=html;

  const el=document.getElementById('analysisContent');
  if(!currentMemberId){el.innerHTML=`<div class="empty"><p>請選擇成員</p></div>`;return;}
  const recs=currentRecords();
  if(!recs.length){el.innerHTML=`<div class="empty"><p>尚無量測紀錄</p></div>`;return;}

  const latest=recs[recs.length-1];
  const prev=recs.length>1?recs[recs.length-2]:null;
  const score=calcScore(latest);
  const scoreColor=score>=80?'#4ECDC4':score>=60?'#FFE66D':'#FF6B6B';

  let out=`<div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:12px">指數評估</div>
    ${METRICS.map(m=>{
      const v=parseFloat(latest[m.key]);if(!v||!m.normal)return'';
      const [lo,hi]=m.normal;
      const status=v<lo?'偏低':v>hi?'偏高':'正常';
      const badgeClass=status==='正常'?'badge-ok':status==='偏低'?'badge-warn':'badge-bad';
      const pct=Math.min(100,Math.max(0,(v-lo*0.8)/((hi*1.2-lo*0.8))*100));
      const delta=prev&&prev[m.key]?(parseFloat(latest[m.key])-parseFloat(prev[m.key])).toFixed(1):null;
      return `<div class="analysis-row">
        <div class="analysis-label">${m.label}</div>
        <div class="analysis-bar-wrap">
          <div style="height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;position:relative">
            <div style="position:absolute;left:${(lo-lo*0.8)/((hi*1.2-lo*0.8))*100}%;width:${(hi-lo)/((hi*1.2-lo*0.8))*100}%;height:100%;background:rgba(78,205,196,0.15);"></div>
            <div style="position:absolute;left:${pct}%;transform:translateX(-50%);width:6px;height:8px;background:${m.color};border-radius:2px;"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:#444;margin-top:2px"><span>${lo}</span><span>${hi}</span></div>
        </div>
        <div class="analysis-val" style="color:${m.color}">${v}${m.unit}</div>
        <span class="badge ${badgeClass}">${status}</span>
        ${delta?`<span style="font-size:11px;color:${parseFloat(delta)>0?'#FF6B6B':'#4ECDC4'};margin-left:4px">${parseFloat(delta)>0?'▲':'▼'}${Math.abs(parseFloat(delta))}</span>`:''}
      </div>`;
    }).join('')}
  </div>`;

  // Trend summary
  if(recs.length>1){
    const first=recs[0];
    out+=`<div class="card">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">累計變化（初次 vs 最新）</div>
      ${METRICS.filter(m=>first[m.key]&&latest[m.key]).map(m=>{
        const diff=(parseFloat(latest[m.key])-parseFloat(first[m.key])).toFixed(1);
        const positive=parseFloat(diff)>0;
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:13px;color:#aaa">${m.label}</span>
          <span style="font-size:14px;font-weight:600;color:${positive?'#FF6B6B':'#4ECDC4'}">${positive?'+':''}${diff} ${m.unit}</span>
        </div>`;
      }).join('')}
    </div>`;
  }

  el.innerHTML=out;
}

    card.innerHTML=`<div style="font-size:14px;font-weight:600;color:${metInfo.color};margin-bottom:8px">${metInfo.label} 成員對比</div><div class="chart-wrap"><canvas id="trendCanvas"></canvas></div>`;
    buildChart({datasets},metInfo);
  } else {
    if(!currentMemberId){card.innerHTML=`<div class="no-trend">請先選擇成員</div>`;return;}
    const recs=currentRecords().filter(r=>r[activeMetric]);
    if(recs.length<2){

      card.innerHTML=`<div class="no-trend">至少需要 2 筆「${metInfo.label}」紀錄</div>`;return;
    }
    const labels=recs.map(r=>r.date.slice(5));

      <div style="font-size:14px;font-weight:600;color:${metInfo.color};margin-bottom:4px">${metInfo.label}${metInfo.unit?' ('+metInfo.unit+')':''}</div>

      <div class="legend">
        ${metInfo.normal?`<span style="color:#4ECDC4">─ 正常下限 ${metInfo.normal[0]}</span><span style="color:#FF6B6B">─ 正常上限 ${metInfo.normal[1]}</span>`:''}
        ${goalVal?`<span style="color:#FFE66D">─ 目標 ${goalVal}</span>`:''}
      </div>`;

    const datasets=[{
      label:metInfo.label,data:values,borderColor:metInfo.color,
      backgroundColor:metInfo.color+'22',borderWidth:2.5,
      pointBackgroundColor:metInfo.color,pointRadius:5,pointHoverRadius:7,tension:0.3,fill:true,
    }];
    buildChart({labels,datasets},metInfo,goalVal);
  }
}

function buildChart({labels,datasets},metInfo,goalVal){
  if(trendChart){trendChart.destroy();trendChart=null;}
  const refPlugin={
    id:'refs',
    afterDraw(chart){
      const{ctx,chartArea:{left,right},scales:{y}}=chart;
      const lines=[];
      if(metInfo.normal){
        lines.push({val:metInfo.normal[0],color:'rgba(78,205,196,0.4)'});
        lines.push({val:metInfo.normal[1],color:'rgba(255,107,107,0.4)'});
      }
      if(goalVal)lines.push({val:parseFloat(goalVal),color:'rgba(255,230,109,0.6)'});
      lines.forEach(l=>{
        try{const yp=y.getPixelForValue(l.val);
          ctx.save();ctx.strokeStyle=l.color;ctx.setLineDash([5,5]);ctx.lineWidth=1.5;
          ctx.beginPath();ctx.moveTo(left,yp);ctx.lineTo(right,yp);ctx.stroke();ctx.restore();
        }catch{}
      });
    }
  };
  trendChart=new Chart(document.getElementById('trendCanvas'),{
    type:'line',data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:datasets.length>1,labels:{color:'#888',font:{size:11}}},
        tooltip:{backgroundColor:'rgba(10,15,30,0.95)',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#888',bodyFont:{size:15,weight:'700'},callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.raw+' '+metInfo.unit}}
      },
      scales:{
        x:{ticks:{color:'#555',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{ticks:{color:'#555',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}},
      }
    },
    plugins:[refPlugin],
  });
}

                <div style="width:${vB?vB/maxV*50:0}%;background:var(--yellow);border-radius:0 4px 4px 0"></div>

            </div>

          </div>

      }).join('')}

    // Comparison chart
    const sharedMetrics=METRICS.filter(m=>latA&&latB&&latA[m.key]&&latB[m.key]);
    if(sharedMetrics.length){
      html+=`<div class="card"><div style="font-size:13px;color:var(--muted);margin-bottom:10px">雷達對比</div><div class="chart-wrap" style="height:260px"><canvas id="compareCanvas"></canvas></div></div>`;
      setTimeout(()=>{
        if(compareChart){compareChart.destroy();compareChart=null;}
        const labels=sharedMetrics.map(m=>m.label);
        const normalize=(v,m)=>Math.min(100,Math.max(0,(parseFloat(v)-m.normal[0]*0.7)/(m.normal[1]*1.3-m.normal[0]*0.7)*100));
        compareChart=new Chart(document.getElementById('compareCanvas'),{
          type:'radar',

            {label:mA.name,data:sharedMetrics.map(m=>normalize(latA[m.key],m)),borderColor:'#4ECDC4',backgroundColor:'rgba(78,205,196,0.15)',borderWidth:2,pointBackgroundColor:'#4ECDC4'},
            {label:mB.name,data:sharedMetrics.map(m=>normalize(latB[m.key],m)),borderColor:'#FFE66D',backgroundColor:'rgba(255,230,109,0.1)',borderWidth:2,pointBackgroundColor:'#FFE66D'},

          }
        });
      },100);
    }
  }

  el.innerHTML=html;

}

function exportCSV(mode){
  const members=mode==='current'&&currentMemberId?[currentMember()]:state.members;
  const allKeys=[...METRICS.map(m=>m.key),...SEGMENTS.map(s=>s.key)];
  const headers=['姓名','日期',...METRICS.map(m=>m.label+`(${m.unit})`),...SEGMENTS.map(s=>s.label)];
  const rows=[headers.join(',')];
  members.forEach(m=>{
    getMemberRecords(m.id).forEach(r=>{
      rows.push([m.name,r.date,...allKeys.map(k=>r[k]||'')].join(','));
    });
  });

function exportJSON(){
  download(JSON.stringify(state,null,2),'tanita_backup.json','application/json');
}

function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const imported=JSON.parse(ev.target.result);
      if(!imported.members||!imported.records)throw new Error('格式錯誤');
      if(!confirm('確定要用備份資料覆蓋現有資料？'))return;
      state=imported;
      if(!state.targets)state.targets={};
      saveState();
      currentMemberId=null;
      switchNav('dashboard');
      alert('還原成功！');
    }catch{alert('檔案格式錯誤，請選擇正確的備份 JSON');}
    e.target.value='';
  };
  reader.readAsText(file);
}

function clearAll(){
  if(!confirm('確定要刪除所有資料？此動作無法復原！'))return;
  state={members:[],records:{},targets:{}};
  currentMemberId=null;compareA=null;compareB=null;
  saveState();
  switchNav('dashboard');
}

function download(content,filename,type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=filename;a.click();
}

function deleteRecord(recId){
  if(!confirm('確定刪除此紀錄？'))return;
  state.records[currentMemberId]=(state.records[currentMemberId]||[]).filter(r=>r.id!==recId);
  saveState();renderRecords();
}

// ── ADD RECORD ──
function goAddRecord(){
  document.getElementById('recDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('mainFields').innerHTML=METRICS.map(m=>`
    <div class="field"><label>${m.label}${m.unit?' ('+m.unit+')':''}</label>
    <input type="number" id="rec_${m.key}" placeholder="輸入${m.label}" step="0.1" style="border-color:${m.color}33"></div>
  `).join('');
  showView('addRecord');
}
function saveRecord(){
  const rec={id:uid(),date:document.getElementById('recDate').value};
  [...METRICS,...SEGMENTS].forEach(m=>{const v=document.getElementById('rec_'+m.key)?.value;if(v)rec[m.key]=v;});
  if(!state.records[currentMemberId])state.records[currentMemberId]=[];
  state.records[currentMemberId].push(rec);
  saveState();goViewRecords();
}

// ── MEMBER FORMS ──
function goAddMember(){
  editingMemberId=null;currentGender='男';
  document.getElementById('mName').value='';
  document.getElementById('mBirth').value='1990';
  document.getElementById('mHeight').value='170';
  document.getElementById('memberFormTitle').textContent='新增成員';
  document.getElementById('saveMemberBtn').textContent='建立成員';
  document.getElementById('deleteMemberBtn').style.display='none';
  selectGender('男');showView('addMember');
}
function goEditMember(){
  const m=currentMember();if(!m)return;
  editingMemberId=m.id;currentGender=m.gender;
  document.getElementById('mName').value=m.name;
  document.getElementById('mBirth').value=m.birthYear;
  document.getElementById('mHeight').value=m.height;
  document.getElementById('memberFormTitle').textContent='編輯成員';
  document.getElementById('saveMemberBtn').textContent='儲存變更';
  document.getElementById('deleteMemberBtn').style.display='block';
  selectGender(m.gender);showView('addMember');
}
function selectGender(g){
  currentGender=g;
  document.querySelectorAll('.gender-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('gBtn'+g).classList.add('active');
}
function saveMember(){
  const name=document.getElementById('mName').value.trim();
  if(!name){alert('請輸入姓名');return;}
  if(editingMemberId){
    state.members=state.members.map(m=>m.id===editingMemberId?{...m,name,gender:currentGender,birthYear:+document.getElementById('mBirth').value,height:+document.getElementById('mHeight').value}:m);
  } else {
    const id=uid();
    state.members.push({id,name,gender:currentGender,birthYear:+document.getElementById('mBirth').value,height:+document.getElementById('mHeight').value});
    state.records[id]=[];state.targets[id]={};
    currentMemberId=id;
  }
  saveState();switchNav('dashboard');
}
function deleteMember(){
  if(!editingMemberId)return;
  if(!confirm('確定要刪除此成員及所有紀錄？'))return;
  state.members=state.members.filter(m=>m.id!==editingMemberId);
  delete state.records[editingMemberId];delete state.targets[editingMemberId];
  if(currentMemberId===editingMemberId)currentMemberId=null;
  saveState();editingMemberId=null;switchNav('dashboard');
}

// ── INIT ──
loadState();
if(!state.targets)state.targets={};
renderDashboard();
</script>
</body>
</html>
