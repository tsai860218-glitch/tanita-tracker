<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanita BC-730 體組成管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--mint:#00FF87;--yellow:#FFE66D;--red:#FF6B6B;--orange:#FFB347;--blue:#5BB8FF;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;min-height:100vh;font-family:'DM Sans','Noto Sans TC',sans-serif;color:#fff;padding-bottom:80px;}

/* LOGIN */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;text-align:center;}
.sync-badge{display:inline-flex;align-items:center;gap:6px;border:1px solid #1a1a1a;border-radius:20px;padding:6px 14px;font-size:11px;color:var(--mint);margin-bottom:24px;letter-spacing:0.05em;}
.login-title{font-size:28px;font-weight:800;margin-bottom:8px;line-height:1.3;letter-spacing:-0.03em;}
.login-sub{font-size:14px;color:#666;margin-bottom:40px;line-height:1.9;}
.google-btn{display:flex;align-items:center;gap:12px;background:#fff;color:#111;border:none;border-radius:14px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.google-btn svg{width:20px;height:20px;flex-shrink:0;}

/* LOADING */
#loadingOverlay{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
.spinner{width:32px;height:32px;border:2px solid #111;border-top-color:var(--mint);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* HEADER */
header{background:#000;border-bottom:1px solid #111;padding:14px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
.logo-sub{font-size:9px;color:var(--mint);letter-spacing:4px;text-transform:uppercase;font-weight:500;}
.logo-main{font-size:17px;font-weight:800;letter-spacing:-0.03em;}
.user-chip{display:flex;align-items:center;gap:10px;}
.user-avatar{width:28px;height:28px;border-radius:50%;border:1px solid #222;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--mint);animation:pulse 2s infinite;}

/* NAV */
nav{position:fixed;bottom:0;left:0;right:0;background:#000;border-top:1px solid #111;display:flex;z-index:200;}
.nav-btn{flex:1;padding:10px 4px;background:none;border:none;color:#444;font-family:inherit;font-size:9px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color 0.2s;letter-spacing:0.03em;text-transform:uppercase;}
.nav-icon{font-size:20px;line-height:1;}
.nav-btn.active{color:var(--mint);}

/* VIEWS */
.view{display:none;padding:20px;}
.view.active{display:block;}

/* MEMBER CHIPS */
.chips-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;}
.chip{padding:7px 16px;border-radius:20px;cursor:pointer;background:none;border:1px solid #1a1a1a;color:#666;font-size:13px;transition:all 0.2s;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.chip.active{border-color:var(--mint);color:var(--mint);font-weight:700;}
.chip.add{border:1px dashed #222;color:#444;}

/* BUTTONS */
.btn{border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all 0.2s;}
.btn-ghost{background:none;border:1px solid #1a1a1a;color:#888;}
.btn-red{background:none;border:1px solid #2a0000;color:var(--red);}
.btn-mint{background:none;border:1px solid #003a1a;color:var(--mint);}
.btn-yellow{background:none;border:1px solid #3a3010;color:var(--yellow);}
.btn-purple{background:none;border:1px solid #2a1a3a;color:#C3B1E1;}
.btn-green{background:none;border:1px solid #1a3020;color:#A8E6CF;}
.btn-full{display:block;width:100%;padding:16px;border-radius:12px;font-size:15px;font-weight:800;text-align:center;}
.btn-primary{background:var(--mint);color:#000;border:none;}
.btn-danger{background:var(--red);color:#fff;border:none;}
.btn-row{display:flex;gap:10px;margin-top:16px;}
.btn:disabled{opacity:0.3;cursor:not-allowed;}

/* FORM FIELDS */
.field{border-bottom:1px solid #111;padding:14px 0;}
.field label{display:block;font-size:9px;color:#666;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.08em;}
.field input,.field select{width:100%;padding:0;border:none;background:none;color:#fff;font-size:20px;font-weight:700;font-family:inherit;outline:none;letter-spacing:-0.02em;}
.field input::placeholder{color:#2a2a2a;}
.field input:focus{color:var(--mint);}
.sec-label{font-size:9px;color:#555;letter-spacing:0.1em;text-transform:uppercase;padding:20px 0 4px;}
.gender-toggle{display:flex;gap:10px;}
.gender-btn{flex:1;padding:12px;text-align:center;border-radius:10px;cursor:pointer;background:none;border:1px solid #1a1a1a;color:#444;font-weight:600;font-family:inherit;font-size:15px;transition:all 0.2s;}
.gender-btn.active{border-color:var(--mint);color:var(--mint);}

/* RECORD TABLE */
.rec-table{width:100%;border-collapse:collapse;font-size:14px;}
.rec-table th{font-size:10px;color:#555;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;text-align:center;padding:10px 8px;border-bottom:1px solid #111;}
.rec-table th:first-child{text-align:left;}
.rec-table td{padding:14px 8px;border-bottom:1px solid #0d0d0d;text-align:center;vertical-align:middle;}
.rec-table td:first-child{text-align:left;font-size:13px;color:#fff;}
.rec-table tr:hover td{background:#080808;}

/* TIME RANGE TABS */
.range-tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid #1a1a1a;border-radius:10px;overflow:hidden;}
.range-tab{flex:1;padding:8px 4px;background:none;border:none;color:#555;font-family:inherit;font-size:11px;font-weight:500;cursor:pointer;transition:all 0.2s;text-align:center;}
.range-tab.active{background:#1a1a1a;color:#fff;font-weight:700;}

/* METRIC PILLS */
.metric-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.metric-pill{padding:7px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #1a1a1a;font-family:inherit;font-weight:400;color:#666;background:none;transition:all 0.2s;}
.metric-pill.active{background:var(--mint);color:#000;border-color:var(--mint);font-weight:700;}

/* CHART */
.chart-wrap{position:relative;height:200px;margin:8px 0;}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#0d0d0d;border:1px solid #0d0d0d;border-radius:8px;overflow:hidden;margin-bottom:16px;}
.cal-day-header{background:#000;padding:8px 4px;text-align:center;font-size:10px;color:#444;letter-spacing:0.04em;}
.cal-day{background:#000;padding:6px 4px;min-height:54px;cursor:pointer;transition:background 0.15s;}
.cal-day:hover{background:#0a0a0a;}
.cal-day.today{background:#0a1a0a;}
.cal-day.other-month{opacity:0.3;}
.cal-num{font-size:12px;font-weight:600;color:#888;margin-bottom:2px;text-align:center;}
.cal-num.today-num{color:var(--mint);}
.cal-weight{font-size:11px;font-weight:700;color:#fff;text-align:center;line-height:1.3;}

/* ANALYSIS */
.analysis-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.analysis-label{font-size:11px;color:#666;width:56px;flex-shrink:0;text-transform:uppercase;letter-spacing:0.04em;}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;}
.badge-ok{border:1px solid #003a1a;color:var(--mint);}
.badge-warn{border:1px solid #3a2000;color:var(--orange);}
.badge-bad{border:1px solid #3a0000;color:var(--red);}

/* COMPARE */
.cmp-card{border-top:1px solid #111;padding-top:20px;margin-top:4px;}

/* DATA MGMT */
.mgmt-item{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid #111;}
.mgmt-info{flex:1;}
.mgmt-title{font-size:14px;font-weight:700;margin-bottom:2px;}
.mgmt-desc{font-size:12px;color:#666;}
.target-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #0d0d0d;}
.target-key{font-size:11px;color:#666;width:60px;flex-shrink:0;text-transform:uppercase;letter-spacing:0.04em;}
.target-input{flex:1;padding:0;border:none;background:none;color:#fff;font-size:16px;font-weight:700;font-family:inherit;outline:none;text-align:right;}

/* BACK BAR */
.back-bar{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.back-bar h2{font-size:20px;font-weight:800;letter-spacing:-0.03em;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;}
.empty p{color:#444;font-size:14px;margin-bottom:20px;}

/* PAGE TITLE */
.page-title{font-size:9px;color:#666;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:20px;}

/* LEGEND */
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;}
.legend span{font-size:11px;color:#666;}

/* NO DATA */
.no-data{text-align:center;color:#333;padding:60px 20px;font-size:14px;}

/* FAB */
.fab{position:fixed;right:20px;bottom:90px;width:56px;height:56px;border-radius:50%;background:var(--mint);color:#000;border:none;font-size:28px;font-weight:800;cursor:pointer;z-index:150;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,255,135,0.3);transition:transform 0.15s;}
.fab:active{transform:scale(0.93);}

/* MEMBER AVATAR CIRCLES */
.member-circles{display:flex;gap:14px;margin-bottom:20px;overflow-x:auto;padding:4px 0;}
.member-circle{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;}
.member-circle-avatar{width:54px;height:54px;border-radius:50%;background:#111;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid transparent;transition:all 0.2s;position:relative;}
.member-circle-avatar.active-ring{border-color:var(--mint);box-shadow:0 0 0 3px rgba(0,255,135,0.2);}
.member-circle-name{font-size:11px;color:#666;font-weight:500;max-width:56px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.member-circle-name.active-name{color:var(--mint);font-weight:700;}
.member-circle-add{width:54px;height:54px;border-radius:50%;border:1.5px dashed #222;display:flex;align-items:center;justify-content:center;font-size:22px;color:#333;cursor:pointer;}

/* STREAK BADGE */
.streak-badge{display:inline-flex;align-items:center;gap:5px;background:#1a1000;border:1px solid #3a2800;border-radius:20px;padding:5px 12px;font-size:12px;color:#FFB347;font-weight:700;}

/* METRICS TIERS */
.metric-primary{font-size:22px;font-weight:800;}
.metric-secondary{font-size:17px;font-weight:700;}

/* RECORD INPUT ROW - like the screenshot */
.rec-input-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid #111;}
.rec-input-label{font-size:17px;font-weight:500;color:#fff;flex:1;}
.rec-input-right{display:flex;align-items:baseline;gap:6px;}
.rec-input-val{width:90px;padding:0;border:none;background:none;color:#fff;font-size:24px;font-weight:800;font-family:inherit;outline:none;text-align:right;letter-spacing:-0.02em;}
.rec-input-val:focus{color:var(--mint);}
.rec-input-val::placeholder{color:#2a2a2a;}
.rec-input-unit{font-size:13px;color:#555;font-weight:400;min-width:28px;}
.rec-date-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid #111;margin-bottom:4px;}
.rec-date-label{font-size:13px;color:#888;}
.rec-date-input{background:none;border:none;color:#fff;font-size:15px;font-weight:700;font-family:inherit;outline:none;text-align:right;}

/* AVATAR PICKER */
.avatar-preview{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;border:2px solid #1a1a1a;cursor:pointer;transition:border-color 0.2s;}
.avatar-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px;}
.avatar-opt{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
.avatar-opt.selected{border-color:var(--mint);}
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div style="font-size:10px;color:#333;letter-spacing:0.12em;text-transform:uppercase;margin-top:8px">連線中</div>
</div>

<div id="loginScreen" style="display:none">
  <div style="font-size:52px;margin-bottom:20px">🧬</div>
  <div class="sync-badge">☁ 即時雲端同步</div>
  <div class="login-title">Tanita BC-730<br>體組成管理</div>
  <div class="login-sub">登入後資料自動同步至雲端<br>手機、電腦、家人裝置皆可共用</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    使用 Google 帳號登入
  </button>
</div>

<div id="mainApp" style="display:none">
  <header>
    <div><div class="logo-sub">TANITA BC-730</div><div class="logo-main">體組成管理</div></div>
    <div class="user-chip">
      <div class="sync-dot"></div>
      <img class="user-avatar" id="userAvatar" src="" alt="">
      <button style="background:none;border:none;color:#444;font-size:11px;cursor:pointer;font-family:inherit" onclick="signOut()">登出</button>
    </div>
  </header>

  <nav>
    <button class="nav-btn active" id="nav-home" onclick="switchNav('home')"><span class="nav-icon">⌂</span>首頁</button>
    <button class="nav-btn" id="nav-calendar" onclick="switchNav('calendar')"><span class="nav-icon">▦</span>日曆</button>
    <button class="nav-btn" id="nav-trend" onclick="switchNav('trend')"><span class="nav-icon">⌇</span>趨勢</button>
    <button class="nav-btn" id="nav-table" onclick="switchNav('table')"><span class="nav-icon">≡</span>表格</button>
    <button class="nav-btn" id="nav-more" onclick="switchNav('more')"><span class="nav-icon">⊙</span>更多</button>
  </nav>

  <!-- HOME -->
  <div class="view active" id="view-home">
    <div class="member-circles" id="homeCircles"></div>
    <div id="homeContent"></div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fabBtn" onclick="fabClick()">＋</button>

  <!-- CALENDAR -->
  <div class="view" id="view-calendar">
    <div class="page-title">日曆</div>
    <div class="chips-row" id="calChips"></div>
    <div id="calContent"></div>
  </div>

  <!-- TREND -->
  <div class="view" id="view-trend">
    <div class="page-title" id="trendTitle">趨勢圖</div>
    <div class="chips-row" id="trendChips"></div>
    <div class="metric-pills" id="metricPills"></div>
    <div id="trendCard"><div class="no-data">選擇成員後顯示趨勢圖</div></div>
  </div>

  <!-- TABLE -->
  <div class="view" id="view-table">
    <div class="page-title">體重紀錄表</div>
    <div class="chips-row" id="tableChips"></div>
    <div class="range-tabs" id="rangeTabs"></div>
    <div id="tableContent"></div>
  </div>

  <!-- MORE -->
  <div class="view" id="view-more">
    <div class="page-title">更多</div>
    <div id="moreContent"></div>
  </div>

  <!-- ADD RECORD (sub) -->
  <div class="view" id="view-addRecord">
    <div class="back-bar"><button class="btn btn-ghost" onclick="goBackFromRecord()">← 返回</button><h2 id="addRecordTitle">新增量測</h2></div>
    <div class="rec-date-row">
      <span class="rec-date-label">日期</span>
      <input type="date" id="recDate" class="rec-date-input">
    </div>
    <div id="mainFields"></div>
    <div style="margin-top:24px"><button class="btn btn-full btn-primary" onclick="saveRecord()">儲存紀錄</button></div>
  </div>

  <!-- MEMBER FORM (sub) -->
  <div class="view" id="view-member">
    <div class="back-bar"><button class="btn btn-ghost" onclick="switchNav('home')">← 返回</button><h2 id="memberFormTitle">新增成員</h2></div>
    <!-- Avatar picker -->
    <div style="text-align:center;padding:16px 0 20px;border-bottom:1px solid #111;margin-bottom:4px">
      <div class="avatar-preview" id="avatarPreview" onclick="toggleAvatarPicker()">😊</div>
      <div style="font-size:10px;color:#444;letter-spacing:0.08em;text-transform:uppercase">點擊選擇頭像</div>
      <div id="avatarPicker" style="display:none;margin-top:16px">
        <div class="avatar-grid" id="avatarGrid"></div>
      </div>
    </div>
    <div class="field"><label>姓名</label><input type="text" id="mName" placeholder="請輸入姓名"></div>
    <div class="field"><label>性別</label>
      <div class="gender-toggle" style="margin-top:4px">
        <button class="gender-btn active" id="gBtn男" onclick="selectGender('男')">男</button>
        <button class="gender-btn" id="gBtn女" onclick="selectGender('女')">女</button>
      </div>
    </div>
    <div class="field"><label>出生年</label><input type="number" id="mBirth" value="1990"></div>
    <div class="field"><label>身高 (cm)</label><input type="number" id="mHeight" value="170"></div>
    <div class="field"><label>量測提醒時間</label><input type="time" id="mRemind" value="07:00"></div>
    <div class="btn-row">
      <button class="btn btn-full btn-primary" id="saveMemberBtn" onclick="saveMember()">建立成員</button>
      <button class="btn btn-full btn-danger" id="deleteMemberBtn" onclick="deleteMember()" style="display:none;flex:0 0 auto;width:auto;padding:16px 20px">刪除</button>
    </div>
  </div>

  <!-- TARGETS (sub) -->
  <div class="view" id="view-targets">
    <div class="back-bar"><button class="btn btn-ghost" onclick="switchNav('more')">← 返回</button><h2>目標設定</h2></div>
    <div id="targetsContent"></div>
  </div>

  <!-- ANALYSIS (sub) -->
  <div class="view" id="view-analysis">
    <div class="back-bar"><button class="btn btn-ghost" onclick="switchNav('home')">← 返回</button><h2 id="analysisTitle">健康分析</h2></div>
    <div id="analysisContent"></div>
  </div>

  <!-- COMPARE (sub) -->
  <div class="view" id="view-compare">
    <div class="back-bar"><button class="btn btn-ghost" onclick="switchNav('more')">← 返回</button><h2>成員對比</h2></div>
    <div id="compareContent"></div>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,GoogleAuthProvider,signInWithPopup,onAuthStateChanged,signOut as fbSignOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,collection,setDoc,getDocs,deleteDoc,onSnapshot,writeBatch}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyACNfOJ2eoK0OvW4i8bl7dKQEvQLYDYDtw",
  authDomain:"tanita-tracker.firebaseapp.com",
  projectId:"tanita-tracker",
  storageBucket:"tanita-tracker.firebasestorage.app",
  messagingSenderId:"55222704289",
  appId:"1:55222704289:web:772e8797e4149ab0dd78e0"
};

const fbApp=initializeApp(firebaseConfig);
const auth=getAuth(fbApp);
const db=getFirestore(fbApp);
let unsubListeners=[];

const membersCol=uid=>collection(db,'users',uid,'members');
const recordsCol=(uid,mid)=>collection(db,'users',uid,'members',mid,'records');
const userDocRef=uid=>doc(db,'users',uid);

window.signInWithGoogle=async()=>{try{await signInWithPopup(auth,new GoogleAuthProvider());}catch(e){console.error(e);alert('登入失敗');}};
window.signOut=async()=>{if(!confirm('確定要登出？'))return;unsubListeners.forEach(u=>u());unsubListeners=[];await fbSignOut(auth);};

onAuthStateChanged(auth,user=>{
  document.getElementById('loadingOverlay').style.display='none';
  if(user){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
    document.getElementById('userAvatar').src=user.photoURL||'';
    initListeners(user.uid);
  }else{
    unsubListeners.forEach(u=>u());unsubListeners=[];
    state={members:[],records:{},targets:{}};
    document.getElementById('mainApp').style.display='none';
    document.getElementById('loginScreen').style.display='flex';
  }
});

function initListeners(uid){
  unsubListeners.forEach(u=>u());unsubListeners=[];
  const unsubM=onSnapshot(membersCol(uid),snap=>{
    state.members=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
    state.members.forEach(m=>{
      const unsubR=onSnapshot(recordsCol(uid,m.id),rSnap=>{
        state.records[m.id]=rSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.date.localeCompare(b.date));
        refreshView();
      });
      unsubListeners.push(unsubR);
    });
    refreshView();
  });
  unsubListeners.push(unsubM);
  const unsubT=onSnapshot(userDocRef(uid),snap=>{
    state.targets=snap.exists()?(snap.data().targets||{}):{};
    refreshView();
  });
  unsubListeners.push(unsubT);
}

window._db={

  async deleteMember(mid){const uid=auth.currentUser.uid;const rSnap=await getDocs(recordsCol(uid,mid));const batch=writeBatch(db);rSnap.forEach(r=>batch.delete(r.ref));batch.delete(doc(membersCol(uid),mid));await batch.commit();},
  async saveRecord(mid,rec){const uid=auth.currentUser.uid;const{id,...data}=rec;await setDoc(doc(recordsCol(uid,mid),id),data);},
  async deleteRecord(mid,rid){const uid=auth.currentUser.uid;await deleteDoc(doc(recordsCol(uid,mid),rid));},
  async saveTargets(targets){const uid=auth.currentUser.uid;await setDoc(userDocRef(uid),{targets},{merge:true});},
  async clearAll(){const uid=auth.currentUser.uid;const mSnap=await getDocs(membersCol(uid));const batch=writeBatch(db);for(const m of mSnap.docs){const rSnap=await getDocs(recordsCol(uid,m.id));rSnap.forEach(r=>batch.delete(r.ref));batch.delete(m.ref);}batch.delete(userDocRef(uid));await batch.commit();}
};

// BMI標準（衛福部）
function getBMIStatus(bmi){
  if(!bmi)return null;
  const v=parseFloat(bmi);
  if(v<18.5)return{label:'過輕',cls:'badge-warn'};
  if(v<24)return{label:'正常',cls:'badge-ok'};
  if(v<27)return{label:'過重',cls:'badge-warn'};
  if(v<30)return{label:'輕度肥胖',cls:'badge-bad'};
  if(v<35)return{label:'中度肥胖',cls:'badge-bad'};
  return{label:'重度肥胖',cls:'badge-bad'};
}
// 體脂率（依性別）
function getBodyFatStatus(val,gender){
  if(!val)return null;
  const v=parseFloat(val);
  const[lo,hi]=gender==='女'?[20,30]:[15,25];
  if(v<lo)return{label:'偏低',cls:'badge-warn'};
  if(v<=hi)return{label:'正常',cls:'badge-ok'};
  return{label:'偏高',cls:'badge-bad'};
}

window.renderHome=function(){
  renderMemberCircles();

  const el=document.getElementById('homeContent');if(!el)return;
  if(!currentMemberId){
    el.innerHTML=state.members.length===0
      ?`<div class="empty"><div style="font-size:48px;margin-bottom:16px">🧬</div><div style="font-size:22px;font-weight:800;letter-spacing:-0.03em;margin-bottom:8px">開始記錄</div><p>新增家庭成員<br>追蹤每次量測結果</p><button class="btn btn-full btn-primary" style="max-width:240px;margin:0 auto" onclick="goAddMember()">＋ 新增第一位成員</button></div>`
      :`<div style="padding:16px 0;text-align:center"><div style="font-size:13px;color:#444;margin-bottom:6px">請點選上方成員</div><div style="font-size:11px;color:#2a2a2a">長按成員頭像可編輯或刪除</div></div>`;
    return;
  }
  const m=currentMember();
  const recs=currentRecords();
  const latest=recs.length?recs[recs.length-1]:null;
  const prev=recs.length>1?recs[recs.length-2]:null;
  const targets=state.targets[currentMemberId]||{};
  let html='';

  // ── Header: big weight ──
  if(latest){
    const w=latest.weight;
    const pw=prev?.weight;
    const wd=w&&pw?(parseFloat(w)-parseFloat(pw)):null;
    const bmiSt=getBMIStatus(latest.bmi);
    const bfSt=getBodyFatStatus(latest.bodyFat,m.gender);

    // Score
    let score=0,scoreCount=0;
    const bmiV=parseFloat(latest.bmi);
    if(bmiV){const s=bmiV>=18.5&&bmiV<24?100:bmiV>=24&&bmiV<27?60:20;score+=s;scoreCount++;}
    const bfV=parseFloat(latest.bodyFat);
    if(bfV){const[lo,hi]=m.gender==='女'?[20,30]:[15,25];const s=bfV>=lo&&bfV<=hi?100:(bfV>=lo*0.9&&bfV<=hi*1.1)?60:20;score+=s;scoreCount++;}
    const sc=scoreCount?Math.round(score/scoreCount):0;
    const scC=sc>=80?'#00FF87':sc>=60?'#FFB347':'#FF6B6B';

    html+=`<div style="padding:0 0 20px;border-bottom:1px solid #111">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:28px;line-height:1">${m.avatar||'👤'}</span><div><div style="font-size:14px;font-weight:700;color:#fff">${m.name}</div><div style="font-size:11px;color:#555">${m.remindTime?m.remindTime+' 量測':''} ${latest.date?'· '+latest.date:''}</div></div></div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost" style="font-size:11px;padding:6px 10px" onclick="goEditMember()">編輯</button>
          <button class="btn btn-ghost" style="font-size:11px;padding:6px 10px" onclick="showAnalysis()">分析</button>
        </div>
      </div>
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
        <span style="font-size:80px;font-weight:800;letter-spacing:-0.04em;line-height:1">${w||'—'}</span>
        <span style="font-size:20px;color:#444;font-weight:400">kg</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        ${wd!=null?`<span style="font-size:13px;color:${wd>0?'#FF6B6B':'#00FF87'};font-weight:600">${wd>0?'▲':'▼'} ${Math.abs(wd).toFixed(1)} kg</span>`:''}
        ${bmiSt?`<span class="badge ${bmiSt.cls}">BMI ${latest.bmi} ${bmiSt.label}</span>`:''}
        ${bfSt?`<span class="badge ${bfSt.cls}">體脂 ${latest.bodyFat}% ${bfSt.label}</span>`:''}
      </div>
      <div style="font-size:11px;color:#555;margin-bottom:8px">健康評分 <span style="color:${scC};font-weight:800;font-size:16px">${sc}</span> <span style="color:#333">/ 100</span></div>
    </div>`;

    // Target progress
    const tw=targets.weight;
    if(tw&&w){
      const cur=parseFloat(w),goal=parseFloat(tw);
      const firstRec=recs.find(r=>r.weight);
      const start=firstRec?parseFloat(firstRec.weight):cur;
      const pct=Math.min(100,Math.max(0,Math.abs(cur-start)/Math.abs(goal-start||1)*100));
      html+=`<div style="padding:16px 0;border-bottom:1px solid #111">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px">
          <span style="font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.06em">目標體重進度</span>
          <span style="font-size:13px;font-weight:700">${cur} <span style="color:#333">→</span> <span style="color:#00FF87">${goal} kg</span></span>
        </div>
        <div style="height:2px;background:#111;border-radius:1px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:#00FF87;border-radius:1px;transition:width 0.6s"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:6px">
          <span style="font-size:10px;color:#333">${start.toFixed(1)} kg</span>
          <span style="font-size:10px;color:#00FF87">${Math.round(pct)}%</span>
          <span style="font-size:10px;color:#333">${goal} kg</span>
        </div>
      </div>`;
    }

    // Streak
    const allDates=recs.map(r=>r.date).sort((a,b)=>b.localeCompare(a));
    let streak=0;
    const td=new Date();
    for(let i=0;i<allDates.length;i++){
      const exp=new Date(td);exp.setDate(td.getDate()-i);
      const expStr=exp.toISOString().split('T')[0];
      if(allDates.includes(expStr))streak++;
      else break;
    }
    if(streak>0)html+=`<div style="padding:12px 0;border-bottom:1px solid #111"><span class="streak-badge">🔥 連續記錄 ${streak} 天</span></div>`;

    // Metrics: primary (weight, bodyFat, muscleMass) big, secondary rest
    const PRIMARY=['bodyFat','muscleMass','bmi'];
    const SECONDARY=['boneMass','visceralFat','bmr','bodyAge','waterContent'];
    const primMetrics=METRICS.filter(x=>PRIMARY.includes(x.key)&&latest[x.key]);

          ${primMetrics.map(m2=>{
            const v=latest[m2.key];const pv=prev?.[m2.key];
            const d=v&&pv?(parseFloat(v)-parseFloat(pv)):null;
            const ds=d!=null?`<div style="font-size:10px;margin-top:4px;color:${d>0?'#FF6B6B':'#00FF87'}">${d>0?'▲':'▼'} ${Math.abs(d).toFixed(1)}</div>`:'';
            const statusBmi=m2.key==='bmi'?getBMIStatus(v):null;
            const statusBf=m2.key==='bodyFat'?getBodyFatStatus(v,m.gender):null;
            const st=statusBmi||statusBf;
            const icon=METRIC_ICONS[m2.key]||'';

              </div>
              <div style="font-size:26px;font-weight:800;letter-spacing:-0.03em;color:#fff">${v}<span style="font-size:12px;font-weight:400;color:#444;margin-left:2px">${m2.unit}</span></div>
              ${st?`<span class="badge ${st.cls}" style="margin-top:6px;display:inline-block">${st.label}</span>`:''}
              ${ds}
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }
    if(secMetrics.length){
      html+=`<div style="margin:0 -20px">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#0d0d0d">
          ${secMetrics.map(m2=>{
            const v=latest[m2.key];const pv=prev?.[m2.key];
            const d=v&&pv?(parseFloat(v)-parseFloat(pv)):null;
            const ds=d!=null?`<div style="font-size:10px;margin-top:3px;color:${d>0?'#FF6B6B':'#00FF87'}">${d>0?'▲':'▼'} ${Math.abs(d).toFixed(1)}</div>`:'';
            const icon=METRIC_ICONS[m2.key]||'';
            return`<div style="background:#000;padding:14px 12px">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
                <div style="width:22px;height:22px;border-radius:50%;background:#0d0d0d;display:flex;align-items:center;justify-content:center;color:${m2.color};flex-shrink:0">${icon}</div>
                <div style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:0.05em">${m2.label}</div>
              </div>
              <div style="font-size:18px;font-weight:800;letter-spacing:-0.03em;color:#888">${v}<span style="font-size:10px;font-weight:400;color:#333;margin-left:1px">${m2.unit}</span></div>
              ${ds}
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }
  } else {
    html+=`<div style="padding:24px 0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:36px">${m.avatar||'👤'}</span>
          <div>
            <div style="font-size:18px;font-weight:800;color:#fff">${m.name}</div>

          </div>
        </div>
        <button class="btn btn-ghost" style="font-size:12px;padding:8px 14px" onclick="goEditMember()">✏️ 編輯</button>
      </div>

        ＋ 新增第一筆量測

    </div>`;
  }

  if(latest){html+=`<div style="padding:16px 0 0"><button class="btn btn-full btn-primary" onclick="goAddRecord('home')" style="padding:18px;font-size:16px">＋ 新增量測</button></div>`;}

// ── CALENDAR ──
window.renderCalendar=function(){
  renderChips('calChips','selectMemberCal');
  const el=document.getElementById('calContent');if(!el)return;
  if(!currentMemberId){el.innerHTML=`<div class="empty"><p>請選擇成員</p></div>`;return;}
  const now=new Date();
  if(!calYear){calYear=now.getFullYear();calMonth=now.getMonth();}
  const recs=currentRecords();
  const recMap={};
  recs.forEach(r=>{if(r.weight)recMap[r.date]=r;});
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const todayStr=now.toISOString().split('T')[0];

  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <button class="btn btn-ghost" style="padding:6px 12px" onclick="calPrev()">‹</button>
    <span style="font-size:16px;font-weight:700">${calYear}年${calMonth+1}月</span>
    <button class="btn btn-ghost" style="padding:6px 12px" onclick="calNext()">›</button>
  </div>
  <div class="cal-grid">
    ${WEEKDAYS.map(d=>`<div class="cal-day-header">${d}</div>`).join('')}
    ${Array(firstDay).fill('<div class="cal-day other-month"></div>').join('')}
    ${Array.from({length:daysInMonth},(_,i)=>{
      const d=i+1;
      const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const rec=recMap[dateStr];
      const isToday=dateStr===todayStr;
      // Color by vs previous recorded weight
      let wColor='#fff';
      if(rec?.weight){
        const sortedRecs=[...recs].filter(r=>r.date<dateStr&&r.weight).sort((a,b)=>b.date.localeCompare(a.date));
        const prevW=sortedRecs[0]?.weight;
        if(prevW){
          const diff=parseFloat(rec.weight)-parseFloat(prevW);
          wColor=diff<-0.1?'#00FF87':diff>0.1?'#FF6B6B':'#888';
        }
      }
      return`<div class="cal-day ${isToday?'today':''}" onclick="calDayClick('${dateStr}')">
        <div class="cal-num ${isToday?'today-num':''}">${d}</div>
        ${rec?.weight?`<div class="cal-weight" style="color:${wColor}">${rec.weight}</div>`:''}
      </div>`;
    }).join('')}
  </div>`;

  // Recent records list
  const recent=[...recs].reverse().slice(0,5);
  if(recent.length){
    html+=`<div style="margin-top:4px">
      <div style="font-size:9px;color:#555;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px">最近紀錄</div>
      ${recent.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #0d0d0d">
        <span style="font-size:13px;color:#888">${r.date}</span>
        <div style="display:flex;align-items:baseline;gap:4px">
          <span style="font-size:22px;font-weight:800;color:#fff">${r.weight||'—'}</span>
          <span style="font-size:11px;color:#444">kg</span>
        </div>
        <button class="btn btn-red" style="font-size:11px;padding:4px 8px" onclick="deleteRecord('${r.id}')">刪除</button>
      </div>`).join('')}
    </div>`;
  }

  html+=`<div style="padding:16px 0"><button class="btn btn-full btn-primary" onclick="goAddRecord('calendar')">＋ 新增量測</button></div>`;
  el.innerHTML=html;
};
window.selectMemberCal=function(id){currentMemberId=id;calYear=null;renderCalendar();};
window.calPrev=function(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();};
window.calNext=function(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();};
window.calDayClick=function(dateStr){
  document.getElementById('recDate').value=dateStr;
  document.getElementById('addRecordTitle').textContent='新增量測 · '+dateStr;
  document.getElementById('mainFields').innerHTML=METRICS.map(m=>`
    <div class="rec-input-row">
      <div style="display:flex;align-items:center;gap:12px;flex:1">
        <div style="width:36px;height:36px;border-radius:50%;background:#0d0d0d;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:${m.color}">
          ${METRIC_ICONS[m.key]||''}
        </div>
        <span class="rec-input-label">${m.label}</span>
      </div>
      <div class="rec-input-right">
        <input type="number" class="rec-input-val" id="rec_${m.key}" placeholder="—" step="0.1" inputmode="decimal">
        <span class="rec-input-unit">${m.unit}</span>
      </div>
    </div>`).join('');
  recordFromView='calendar';
  showSubView('addRecord');
};

// ── TABLE ──
window.renderTable=function(){
  renderChips('tableChips','selectMemberTable');
  // Range tabs
  const rt=document.getElementById('rangeTabs');
  if(rt)rt.innerHTML=RANGES.map((r,i)=>`<button class="range-tab ${r.days===tableRange?'active':''}" onclick="setTableRange(${r.days})">${r.label}</button>`).join('');
  const el=document.getElementById('tableContent');if(!el)return;
  if(!currentMemberId){el.innerHTML=`<div class="empty"><p>請選擇成員</p></div>`;return;}
  const recs=currentRecords();
  if(!recs.length){el.innerHTML=`<div class="empty"><p>尚無量測紀錄</p></div>`;return;}

  // Build date range
  const today=new Date();
  const dates=[];
  for(let i=0;i<tableRange;i++){
    const d=new Date(today);d.setDate(today.getDate()-i);
    dates.push(d.toISOString().split('T')[0]);
  }

  const recMap={};recs.forEach(r=>{recMap[r.date]=r;});
  const firstRec=recs[0];
  const firstWeight=firstRec?.weight?parseFloat(firstRec.weight):null;

  let html=`<div style="overflow-x:auto">
    <table class="rec-table">
      <thead><tr>
        <th>日期</th>
        <th>體重</th>
        <th>與昨天相比</th>
        <th>與第一天...</th>
      </tr></thead>
      <tbody>
        ${dates.map((dateStr,i)=>{
          const rec=recMap[dateStr];
          const w=rec?.weight?parseFloat(rec.weight):null;
          const d=new Date(dateStr);
          const dayLabel=`${d.getMonth()+1}/${d.getDate()}（週${WEEKDAYS[d.getDay()]}）`;

          // vs yesterday
          const prevDateStr=dates[i+1];
          const prevRec=prevDateStr?recMap[prevDateStr]:null;
          const pw=prevRec?.weight?parseFloat(prevRec.weight):null;
          const diff=w&&pw?(w-pw):null;

          // vs first day
          const totalDiff=w&&firstWeight?(w-firstWeight):null;

          return`<tr>
            <td>${dayLabel}</td>
            <td style="font-size:16px;font-weight:800;color:#fff">${w?w.toFixed(1):'<span style="color:#333">-</span>'}</td>
            <td style="font-weight:700;color:${diff==null?'#333':diff>0?'#FF6B6B':diff<0?'#00FF87':'#888'};font-size:14px">${diff==null?'<span style="color:#333">-</span>':(diff>0?'+':'')+diff.toFixed(1)}</td>
            <td style="font-weight:700;color:${totalDiff==null?'#333':totalDiff>0?'#FF6B6B':totalDiff<0?'#00FF87':'#888'};font-size:14px">${totalDiff==null?'<span style="color:#333">-</span>':(totalDiff>0?'+':'')+totalDiff.toFixed(1)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
  el.innerHTML=html;
};
window.selectMemberTable=function(id){currentMemberId=id;renderTable();};
window.setTableRange=function(days){tableRange=days;renderTable();};

  if(recs.length<2){if(trendChart){trendChart.destroy();trendChart=null;}card.innerHTML=`<div class="no-data">至少需要 2 筆「${mi.label}」紀錄</div>`;return;}
  const labels=recs.map(r=>r.date.slice(5)),values=recs.map(r=>parseFloat(r[activeMetric]));
  const gv=(state.targets[currentMemberId]||{})[activeMetric];
  const minV=Math.min(...values),maxV=Math.max(...values);
  card.innerHTML=`<div style="font-size:9px;color:#555;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:16px">${mi.label}${mi.unit?' · '+mi.unit:''}</div>
    <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:4px">
      <span style="font-size:36px;font-weight:800;letter-spacing:-0.03em">${values[values.length-1].toFixed(1)}</span>
      <span style="font-size:14px;color:#444">${mi.unit}</span>
      ${values.length>1?`<span style="font-size:12px;color:${values[values.length-1]>values[0]?'#FF6B6B':'#00FF87'}">${values[values.length-1]>values[0]?'▲':'▼'} ${Math.abs(values[values.length-1]-values[0]).toFixed(1)}</span>`:''}
    </div>
    <div style="font-size:11px;color:#444;margin-bottom:16px">最高 ${maxV.toFixed(1)}　最低 ${minV.toFixed(1)}　共 ${values.length} 筆</div>
    <div class="chart-wrap"><canvas id="trendCanvas"></canvas></div>
    <div class="legend">${mi.normal?`<span style="color:#333">▬ 正常範圍 ${mi.normal[0]}–${mi.normal[1]}</span>`:''} ${gv?`<span style="color:#00FF87">▬ 目標 ${gv}</span>`:''}</div>`;
  buildChart(labels,values,mi,gv);
};

window.setMetric=function(k){activeMetric=k;renderTrend();};

function buildChart(labels,values,mi,gv){
  if(trendChart){trendChart.destroy();trendChart=null;}
  const refPlugin={id:'refs',afterDraw(chart){
    const{ctx,chartArea:{left,right},scales:{y}}=chart;
    const lines=[];
    if(mi.normal){lines.push({val:mi.normal[0],c:'rgba(0,255,135,0.2)'});lines.push({val:mi.normal[1],c:'rgba(255,107,107,0.2)'});}
    if(gv)lines.push({val:parseFloat(gv),c:'rgba(0,255,135,0.5)'});
    lines.forEach(l=>{try{const yp=y.getPixelForValue(l.val);ctx.save();ctx.strokeStyle=l.c;ctx.setLineDash([4,4]);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(left,yp);ctx.lineTo(right,yp);ctx.stroke();ctx.restore();}catch{}});
  }};
  trendChart=new Chart(document.getElementById('trendCanvas'),{
    type:'line',
    data:{labels,datasets:[{label:mi.label,data:values,borderColor:'#00FF87',backgroundColor:'rgba(0,255,135,0.04)',borderWidth:1.5,pointBackgroundColor:'#00FF87',pointRadius:3,pointHoverRadius:6,tension:0.4,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#0a0a0a',borderColor:'#1a1a1a',borderWidth:1,titleColor:'#555',bodyColor:'#fff',bodyFont:{size:16,weight:'800'},callbacks:{label:ctx=>ctx.raw.toFixed(1)+' '+mi.unit}}},scales:{x:{ticks:{color:'#333',font:{size:10}},grid:{color:'#0d0d0d'}},y:{ticks:{color:'#333',font:{size:10}},grid:{color:'#0d0d0d'}}}},
    plugins:[refPlugin]
  });
}

// ── ANALYSIS ──
function renderAnalysis(){
  const el=document.getElementById('analysisContent');if(!el)return;
  const m=currentMember();
  if(!currentMemberId||!m){el.innerHTML=`<div class="empty"><p>請選擇成員</p></div>`;return;}
  const recs=currentRecords();if(!recs.length){el.innerHTML=`<div class="empty"><p>尚無量測紀錄</p></div>`;return;}
  const latest=recs[recs.length-1],prev=recs.length>1?recs[recs.length-2]:null;

  let out=`<div>`;
  METRICS.forEach(mt=>{
    const v=parseFloat(latest[mt.key]);if(!v||!mt.normal)return;
    const[lo,hi]=mt.key==='bodyFat'?m.gender==='女'?[20,30]:[15,25]:mt.normal;
    const bmiSt=mt.key==='bmi'?getBMIStatus(latest.bmi):null;
    const st=bmiSt?bmiSt:{label:v<lo?'偏低':v>hi?'偏高':'正常',cls:v<lo?'badge-warn':v>hi?'badge-bad':'badge-ok'};
    const pct=Math.min(100,Math.max(0,(v-lo*0.8)/((hi*1.2-lo*0.8))*100));
    const d=prev&&prev[mt.key]?(parseFloat(latest[mt.key])-parseFloat(prev[mt.key])).toFixed(1):null;
    out+=`<div class="analysis-row">
      <div class="analysis-label">${mt.label}</div>
      <div style="flex:1">
        <div style="height:4px;background:#111;border-radius:2px;overflow:hidden;position:relative;margin-bottom:4px">
          <div style="position:absolute;left:${(lo-lo*0.8)/((hi*1.2-lo*0.8))*100}%;width:${(hi-lo)/((hi*1.2-lo*0.8))*100}%;height:100%;background:rgba(0,255,135,0.1)"></div>
          <div style="position:absolute;left:${pct}%;transform:translateX(-50%);width:6px;height:4px;background:${mt.color};border-radius:2px"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:9px;color:#333"><span>${lo}</span><span>${hi}</span></div>
      </div>
      <div style="font-size:16px;font-weight:800;width:56px;text-align:right;color:#fff">${v}${mt.unit}</div>
      <span class="badge ${st.cls}">${st.label}</span>
      ${d?`<span style="font-size:10px;color:${parseFloat(d)>0?'#FF6B6B':'#00FF87'};margin-left:2px">${parseFloat(d)>0?'▲':'▼'}${Math.abs(parseFloat(d))}</span>`:''}
    </div>`;
  });

  if(recs.length>1){
    const first=recs[0];
    out+=`<div style="margin-top:20px;padding-top:16px;border-top:1px solid #111">
      <div style="font-size:9px;color:#555;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px">累計變化</div>
      ${METRICS.filter(mt=>first[mt.key]&&latest[mt.key]).map(mt=>{
        const df=(parseFloat(latest[mt.key])-parseFloat(first[mt.key])).toFixed(1);
        return`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #0d0d0d">
          <span style="font-size:13px;color:#666;text-transform:uppercase;letter-spacing:0.04em">${mt.label}</span>
          <span style="font-size:16px;font-weight:800;color:${parseFloat(df)>0?'#FF6B6B':'#00FF87'}">${parseFloat(df)>0?'+':''}${df} ${mt.unit}</span>
        </div>`;
      }).join('')}
    </div>`;
  }
  out+=`</div>`;
  el.innerHTML=out;
}

// ── COMPARE ──
function renderCompare(){
  const el=document.getElementById('compareContent');if(!el)return;
  if(state.members.length<2){el.innerHTML=`<div class="empty"><p>至少需要 2 位成員才能對比</p></div>`;return;}
  const mA=compareA?state.members.find(m=>m.id===compareA):null;
  const mB=compareB?state.members.find(m=>m.id===compareB):null;
  let html=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
    <div style="border-radius:12px;border:1.5px solid ${compareA?'#00FF87':'#1a1a1a'};overflow:hidden">
      <div style="padding:10px 12px;border-bottom:1px solid #0d0d0d;display:flex;align-items:center;gap:6px">
        <div style="width:7px;height:7px;border-radius:50%;background:#00FF87"></div>
        <span style="font-size:10px;color:#00FF87;font-weight:600;letter-spacing:0.06em">成員 A</span>
      </div>
      <div style="padding:6px">
        ${state.members.map(m=>`<button onclick="compareA='${m.id}';${compareB===m.id?'compareB=null;':''}renderCompare()"
          style="width:100%;padding:10px 12px;margin-bottom:4px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:${compareA===m.id?'800':'400'};text-align:left;background:${compareA===m.id?'rgba(0,255,135,0.1)':'rgba(255,255,255,0.02)'};color:${compareA===m.id?'#00FF87':'#666'};opacity:${compareB===m.id?'0.3':'1'}">${compareA===m.id?'✓ ':''}${m.name}</button>`).join('')}
      </div>
    </div>
    <div style="border-radius:12px;border:1.5px solid ${compareB?'#FFE66D':'#1a1a1a'};overflow:hidden">
      <div style="padding:10px 12px;border-bottom:1px solid #0d0d0d;display:flex;align-items:center;gap:6px">
        <div style="width:7px;height:7px;border-radius:50%;background:#FFE66D"></div>
        <span style="font-size:10px;color:#FFE66D;font-weight:600;letter-spacing:0.06em">成員 B</span>
      </div>
      <div style="padding:6px">
        ${state.members.map(m=>`<button onclick="compareB='${m.id}';${compareA===m.id?'compareA=null;':''}renderCompare()"
          style="width:100%;padding:10px 12px;margin-bottom:4px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:${compareB===m.id?'800':'400'};text-align:left;background:${compareB===m.id?'rgba(255,230,109,0.1)':'rgba(255,255,255,0.02)'};color:${compareB===m.id?'#FFE66D':'#666'};opacity:${compareA===m.id?'0.3':'1'}">${compareB===m.id?'✓ ':''}${m.name}</button>`).join('')}
      </div>
    </div>
  </div>`;

  if(!compareA||!compareB){
    html+=`<div style="text-align:center;padding:30px;color:#333;font-size:14px;border:1px dashed #1a1a1a;border-radius:12px">${!compareA&&!compareB?'請從左右各選一位成員':!compareA?'請選擇成員 A':'請選擇成員 B'}</div>`;
    el.innerHTML=html;return;
  }
  const lA=getRecords(compareA).slice(-1)[0],lB=getRecords(compareB).slice(-1)[0];
  html+=`<div class="cmp-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span style="font-size:16px;font-weight:800;color:#00FF87">${mA.name}</span>
      <span style="font-size:12px;color:#333">vs</span>
      <span style="font-size:16px;font-weight:800;color:#FFE66D">${mB.name}</span>
    </div>
    ${METRICS.map(mt=>{
      const vA=lA?parseFloat(lA[mt.key]):null,vB=lB?parseFloat(lB[mt.key]):null;
      if(!vA&&!vB)return'';
      const mx=Math.max(vA||0,vB||0)||1;
      const lb=mt.key==='bodyFat'||mt.key==='visceralFat'||mt.key==='bodyAge';
      const win=vA&&vB?(lb?vA<vB?'A':vA>vB?'B':'':vA>vB?'A':vA<vB?'B':''):null;
      return`<div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.04em">${mt.label}${mt.unit?' ('+mt.unit+')':''}</span>
          ${win?`<span style="font-size:10px;color:${win==='A'?'#00FF87':'#FFE66D'};font-weight:700">▲ ${win==='A'?mA.name:mB.name}</span>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:15px;font-weight:800;color:#00FF87;width:52px;text-align:right">${vA??'—'}</span>
          <div style="flex:1;height:6px;background:#0d0d0d;border-radius:3px;overflow:hidden;display:flex">
            <div style="width:${vA?vA/mx*50:0}%;background:#00FF87;border-radius:3px 0 0 3px;margin-left:auto"></div>
            <div style="width:${vB?vB/mx*50:0}%;background:#FFE66D;border-radius:0 3px 3px 0"></div>
          </div>
          <span style="font-size:15px;font-weight:800;color:#FFE66D;width:52px">${vB??'—'}</span>
        </div>
      </div>`;
    }).join('')}
  </div>`;
  el.innerHTML=html;
}

// ── TARGETS ──
function renderTargets(){
  const el=document.getElementById('targetsContent');if(!el)return;
  if(!state.members.length){el.innerHTML=`<div class="empty"><p>尚無成員</p></div>`;return;}

  // BMI reference info
  el.innerHTML=`<div style="padding:12px;background:#080808;border-radius:10px;margin-bottom:20px;border:1px solid #111">
    <div style="font-size:9px;color:#555;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px">衛福部 BMI 標準</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px">
      <span style="color:#888">&lt; 18.5 過輕</span><span style="color:#888">18.5–24 正常</span>
      <span style="color:#FFB347">24–27 過重</span><span style="color:#FF6B6B">27–30 輕度肥胖</span>
      <span style="color:#FF6B6B">30–35 中度肥胖</span><span style="color:#FF6B6B">≥ 35 重度肥胖</span>
    </div>
  </div>
  ${state.members.map(m=>`
    <div style="border-bottom:1px solid #111;padding:16px 0;margin-bottom:4px">
      <div style="font-size:16px;font-weight:800;margin-bottom:12px">${m.name}</div>
      <div style="font-size:9px;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em">建議目標體重 (BMI 24) = ${(24*m.height/100*m.height/100).toFixed(1)} kg</div>
      ${METRICS.filter(mt=>mt.goalable).map(mt=>`
        <div class="target-row">
          <div class="target-key">${mt.label}</div>
          <input class="target-input" type="number" step="0.1" placeholder="—" value="${state.targets[m.id]?.[mt.key]||''}" id="tgt_${m.id}_${mt.key}">
          <span style="font-size:11px;color:#444;margin-left:6px">${mt.unit}</span>
        </div>`).join('')}
      <button class="btn btn-mint" style="margin-top:12px;width:100%;font-size:13px;padding:10px" onclick="saveTargets('${m.id}')">儲存目標</button>
    </div>`).join('')}`;
}
window.saveTargets=async function(mid){
  if(!state.targets[mid])state.targets[mid]={};
  METRICS.filter(m=>m.goalable).forEach(m=>{
    const v=document.getElementById(`tgt_${mid}_${m.key}`)?.value;
    if(v)state.targets[mid][m.key]=v;else delete state.targets[mid][m.key];
  });
  await _db.saveTargets(state.targets);
  alert('目標已儲存！');
};

// ── RECORDS ──
window.goAddRecord=function(fromView){
  recordFromView=fromView||'home';
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('recDate').value=today;
  document.getElementById('addRecordTitle').textContent='新增量測';

    <div class="rec-input-row">
      <div style="display:flex;align-items:center;gap:12px;flex:1">
        <div style="width:36px;height:36px;border-radius:50%;background:#0d0d0d;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:${m.color}">
          ${METRIC_ICONS[m.key]||''}
        </div>
        <span class="rec-input-label">${m.label}</span>
      </div>
      <div class="rec-input-right">
        <input type="number" class="rec-input-val" id="rec_${m.key}" placeholder="—" step="0.1" inputmode="decimal">
        <span class="rec-input-unit">${m.unit}</span>

window.goBackFromRecord=function(){switchNav(recordFromView);};
window.saveRecord=async function(){
  if(!currentMemberId){alert('請先選擇成員');return;}
  const rec={id:uid(),date:document.getElementById('recDate').value};
  METRICS.forEach(m=>{const v=document.getElementById('rec_'+m.key)?.value;if(v)rec[m.key]=v;});

  switchNav(recordFromView);
};
window.deleteRecord=async function(rid){
  if(!confirm('確定刪除此紀錄？'))return;
  await _db.deleteRecord(currentMemberId,rid);
};

// ── MEMBER FORMS ──
const AVATARS=['😊','😎','🧑','👦','👧','👨','👩','🧒','👴','👵','🧔','👱','🏃','💪','🧘','⚽','🎯','🌟','🦁','🐯','🐼','🐻','🦊','🐶','🐱','🐸'];
let currentAvatar='😊';

window.toggleAvatarPicker=function(){
  const p=document.getElementById('avatarPicker');
  p.style.display=p.style.display==='none'?'block':'none';
  if(p.style.display==='block') renderAvatarGrid();
};
function renderAvatarGrid(){
  document.getElementById('avatarGrid').innerHTML=AVATARS.map(a=>`
    <div class="avatar-opt ${a===currentAvatar?'selected':''}" onclick="selectAvatar('${a}')">${a}</div>
  `).join('');
}
window.selectAvatar=function(a){
  currentAvatar=a;
  document.getElementById('avatarPreview').textContent=a;
  document.getElementById('avatarPicker').style.display='none';
  renderAvatarGrid();
};

window.goAddMember=function(){
  editingMemberId=null;currentGender='男';currentAvatar='😊';
  document.getElementById('mName').value='';
  document.getElementById('mBirth').value='1990';
  document.getElementById('mHeight').value='170';
  document.getElementById('mRemind').value='07:00';
  document.getElementById('avatarPreview').textContent='😊';
  document.getElementById('avatarPicker').style.display='none';
  document.getElementById('memberFormTitle').textContent='新增成員';
  document.getElementById('saveMemberBtn').textContent='建立成員';
  document.getElementById('deleteMemberBtn').style.display='none';
  selectGender('男');showSubView('member');
};
window.goEditMember=function(){
  const m=currentMember();if(!m)return;
  editingMemberId=m.id;currentGender=m.gender;currentAvatar=m.avatar||'😊';
  document.getElementById('mName').value=m.name;
  document.getElementById('mBirth').value=m.birthYear||1990;
  document.getElementById('mHeight').value=m.height||170;
  document.getElementById('mRemind').value=m.remindTime||'07:00';
  document.getElementById('avatarPreview').textContent=currentAvatar;
  document.getElementById('avatarPicker').style.display='none';
  document.getElementById('memberFormTitle').textContent='編輯成員';
  document.getElementById('saveMemberBtn').textContent='儲存變更';
  document.getElementById('deleteMemberBtn').style.display='block';
  selectGender(m.gender||'男');showSubView('member');
};
window.selectGender=function(g){
  currentGender=g;
  document.querySelectorAll('.gender-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('gBtn'+g).classList.add('active');
};
window.saveMember=async function(){
  const name=document.getElementById('mName').value.trim();
  if(!name){alert('請輸入姓名');return;}
  const remindTime=document.getElementById('mRemind').value;
  const m={id:editingMemberId||uid(),name,gender:currentGender,avatar:currentAvatar,birthYear:+document.getElementById('mBirth').value,height:+document.getElementById('mHeight').value,remindTime,createdAt:Date.now()};
  await _db.saveMember(m);
  if(!editingMemberId)currentMemberId=m.id;
  // Request notification permission if remind time set
  if(remindTime&&'Notification' in window&&Notification.permission==='default'){
    const perm=await Notification.requestPermission();
    if(perm==='granted')scheduleReminders();
  } else if(remindTime&&Notification.permission==='granted'){
    scheduleReminders();
  }
  switchNav('home');
};

// ── NOTIFICATIONS ──
function scheduleReminders(){
  // Clear old alarms (store in localStorage for persistence)
  try{
    const now=new Date();
    state.members.forEach(m=>{
      if(!m.remindTime)return;
      const[h,min]=m.remindTime.split(':').map(Number);
      const next=new Date();
      next.setHours(h,min,0,0);
      if(next<=now)next.setDate(next.getDate()+1);
      const delay=next-now;
      setTimeout(()=>{
        if(Notification.permission==='granted'){
          new Notification('Tanita BC-730 量測提醒',{
            body:`${m.avatar||''}  ${m.name}，該量測體組成了！`,
            icon:'/favicon.ico',
            tag:'tanita-remind-'+m.id
          });
        }
        scheduleReminders(); // reschedule next day
      },delay);
    });
  }catch(e){console.warn('Notification error:',e);}
}
window.requestNotifPermission=async function(){
  if(!('Notification' in window)){alert('您的瀏覽器不支援通知功能');return;}
  const perm=await Notification.requestPermission();
  if(perm==='granted'){scheduleReminders();alert('通知已開啟！');}
  else alert('請在瀏覽器設定中允許通知權限');
  renderMore();
};
window.deleteMember=async function(){
  if(!editingMemberId)return;
  if(!confirm('確定要刪除此成員及所有紀錄？'))return;
  await _db.deleteMember(editingMemberId);
  if(currentMemberId===editingMemberId)currentMemberId=null;
  editingMemberId=null;switchNav('home');
};

// ── DATA ──
window.exportCSV=function(mode){
  const ms=mode==='current'&&currentMemberId?[currentMember()]:state.members;
  const ks=METRICS.map(m=>m.key);
  const rows=[['姓名','日期',...METRICS.map(m=>m.label+'('+m.unit+')')].join(',')];
  ms.forEach(m=>{getRecords(m.id).forEach(r=>{rows.push([m.name,r.date,...ks.map(k=>r[k]||'')].join(','));});});
  dl(rows.join('\n'),'tanita_records.csv','text/csv');
};
window.exportJSON=function(){dl(JSON.stringify(state,null,2),'tanita_backup.json','application/json');};
window.importJSON=async function(e){
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{const imp=JSON.parse(ev.target.result);if(!imp.members||!imp.records)throw 0;if(!confirm('確定要將備份資料合併至雲端？'))return;for(const m of imp.members){await _db.saveMember(m);for(const r of(imp.records[m.id]||[])){await _db.saveRecord(m.id,r);}}if(imp.targets)await _db.saveTargets(imp.targets);alert('匯入成功！');}catch{alert('檔案格式錯誤');}e.target.value='';
  };reader.readAsText(f);
};
window.clearAll=async function(){
  if(!confirm('確定要從雲端永久刪除所有資料？'))return;
  await _db.clearAll();currentMemberId=null;compareA=null;compareB=null;switchNav('home');
};
function dl(c,n,t){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:t}));a.download=n;a.click();}

// INIT
switchNav('home');
// Auto-schedule if permission already granted
if('Notification' in window && Notification.permission==='granted'){
  setTimeout(scheduleReminders, 2000);
}
</script>
