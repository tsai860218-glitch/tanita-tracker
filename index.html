<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanita BC-730 體組成管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#090e1d;--bg2:#0d1525;--card:rgba(255,255,255,0.035);--border:rgba(255,255,255,0.08);--teal:#4ECDC4;--yellow:#FFE66D;--red:#FF6B6B;--green:#A8E6CF;--purple:#C3B1E1;--orange:#FFB347;--blue:#87CEEB;--pink:#DDA0DD;--cyan:#00CED1;--text:#e8eaf6;--muted:#6b7280;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);min-height:100vh;font-family:'DM Sans','Noto Sans TC',sans-serif;color:var(--text);padding-bottom:90px;}
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;text-align:center;}
.login-logo{font-size:64px;margin-bottom:20px;}
.login-title{font-size:26px;font-weight:700;margin-bottom:8px;line-height:1.3;}
.login-sub{font-size:14px;color:var(--muted);margin-bottom:40px;line-height:1.8;}
.sync-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(78,205,196,0.1);border:1px solid rgba(78,205,196,0.25);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--teal);margin-bottom:20px;}
.google-btn{display:flex;align-items:center;gap:12px;background:#fff;color:#333;border:none;border-radius:14px;padding:14px 28px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.google-btn svg{width:20px;height:20px;flex-shrink:0;}
header{background:rgba(255,255,255,0.025);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
.logo-sub{font-size:9px;color:var(--teal);letter-spacing:3px;text-transform:uppercase;font-weight:500;}
.logo-main{font-size:18px;font-weight:700;letter-spacing:-0.5px;}
.user-chip{display:flex;align-items:center;gap:8px;}
.user-avatar{width:30px;height:30px;border-radius:50%;border:2px solid rgba(78,205,196,0.4);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4ECDC4;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(9,14,29,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:200;}
.nav-btn{flex:1;padding:10px 4px 8px;background:none;border:none;color:var(--muted);font-family:inherit;font-size:10px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color 0.2s;}
.nav-btn .nav-icon{font-size:19px;}
.nav-btn.active{color:var(--teal);}
.view{display:none;padding:20px 16px;}
.view.active{display:block;}
#loadingOverlay{position:fixed;inset:0;background:rgba(9,14,29,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
.spinner{width:40px;height:40px;border:3px solid rgba(78,205,196,0.2);border-top-color:#4ECDC4;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:14px;}
.member-chips{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.chip{padding:10px 16px;border-radius:14px;cursor:pointer;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#bbb;font-size:14px;transition:all 0.2s;font-family:inherit;}
.chip.active{background:linear-gradient(135deg,#4ECDC4,#44A8A0);border:none;color:#fff;font-weight:700;}
.chip.add{border:1px dashed rgba(78,205,196,0.4);color:var(--teal);font-weight:500;background:none;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stat-cell{background:rgba(255,255,255,0.04);border-radius:12px;padding:12px 10px;}
.stat-label{font-size:10px;color:var(--muted);margin-bottom:2px;}
.stat-value{font-size:17px;font-weight:700;}
.stat-unit{font-size:10px;font-weight:400;color:#555;margin-left:2px;}
.stat-delta{font-size:10px;margin-top:2px;}
.btn{border:none;border-radius:12px;padding:10px 16px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:all 0.2s;}
.btn-teal{background:rgba(78,205,196,0.15);border:1px solid rgba(78,205,196,0.35);color:var(--teal);}
.btn-yellow{background:rgba(255,230,109,0.15);border:1px solid rgba(255,230,109,0.35);color:var(--yellow);}
.btn-red{background:rgba(255,107,107,0.15);border:1px solid rgba(255,107,107,0.35);color:var(--red);}
.btn-purple{background:rgba(195,177,225,0.15);border:1px solid rgba(195,177,225,0.35);color:var(--purple);}
.btn-green{background:rgba(168,230,207,0.15);border:1px solid rgba(168,230,207,0.35);color:var(--green);}
.btn-full{display:block;width:100%;padding:14px 20px;border-radius:14px;font-size:15px;font-weight:700;text-align:center;}
.btn-primary{background:linear-gradient(135deg,var(--teal),#44a8a0);color:#0a0f1e;}
.btn-danger{background:linear-gradient(135deg,var(--red),#d44);color:#fff;}
.btn-ghost{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#ccc;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn-row{display:flex;gap:10px;margin-top:10px;}
.back-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.back-bar h2{font-size:18px;font-weight:700;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;padding-left:2px;}
.field input,.field select{width:100%;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--text);font-size:16px;font-family:inherit;outline:none;}
.field input:focus{border-color:rgba(78,205,196,0.5);}
.section-label{font-size:11px;color:var(--teal);letter-spacing:2px;text-transform:uppercase;margin:14px 0 8px 2px;}
.gender-toggle{display:flex;gap:10px;}
.gender-btn{flex:1;padding:12px;text-align:center;border-radius:12px;cursor:pointer;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#aaa;font-weight:500;font-family:inherit;font-size:15px;transition:all 0.2s;}
.gender-btn.active{background:rgba(78,205,196,0.15);border-color:var(--teal);color:var(--teal);}
.metric-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.metric-pill{padding:8px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:none;font-family:inherit;font-weight:400;color:#aaa;background:rgba(255,255,255,0.06);transition:all 0.2s;}
.chart-wrap{position:relative;height:220px;margin:10px 0;}
.record-item{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;}
.record-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.record-date{font-size:14px;font-weight:600;color:var(--teal);}
.record-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.record-metric{font-size:12px;}
.record-metric span{color:var(--muted);}
.empty{text-align:center;padding:50px 20px;}
.empty p{color:var(--muted);font-size:14px;margin-bottom:20px;}
.legend{display:flex;gap:14px;padding:4px 0;margin-top:6px;flex-wrap:wrap;}
.legend span{font-size:11px;}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.top-row .actions{display:flex;gap:8px;flex-wrap:wrap;}
.no-trend{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px;}
.score-ring{display:flex;align-items:center;gap:20px;padding:10px 0;}
.score-num{font-size:52px;font-weight:700;line-height:1;}
.score-label{font-size:12px;color:var(--muted);}
.score-desc{font-size:14px;margin-top:4px;font-weight:500;}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.compare-member{padding:10px 14px;border-radius:12px;cursor:pointer;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);font-size:13px;color:#aaa;font-family:inherit;transition:all 0.2s;text-align:center;}
.compare-member.sel-a{background:rgba(78,205,196,0.15);border-color:var(--teal);color:var(--teal);font-weight:600;}
.compare-member.sel-b{background:rgba(255,230,109,0.15);border-color:var(--yellow);color:var(--yellow);font-weight:600;}
.analysis-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.analysis-label{font-size:12px;color:#aaa;width:56px;flex-shrink:0;}
.analysis-bar-wrap{flex:1;}
.analysis-val{font-size:12px;font-weight:600;width:52px;text-align:right;flex-shrink:0;}
.badge{display:inline-block;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:600;}
.badge-ok{background:rgba(78,205,196,0.15);color:var(--teal);}
.badge-warn{background:rgba(255,179,71,0.15);color:var(--orange);}
.badge-bad{background:rgba(255,107,107,0.15);color:var(--red);}
.mgmt-item{display:flex;align-items:center;justify-content:space-between;padding:16px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;}
.mgmt-info{flex:1;}
.mgmt-title{font-size:14px;font-weight:600;margin-bottom:2px;}
.mgmt-desc{font-size:12px;color:var(--muted);}
.target-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.target-key{font-size:13px;color:#aaa;width:60px;flex-shrink:0;}
.target-input{flex:1;padding:8px 12px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--text);font-size:14px;font-family:inherit;outline:none;}
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div style="font-size:14px;color:var(--muted)">連線中...</div>
</div>

<div id="loginScreen" style="display:none">
  <div class="login-logo">🧬</div>
  <div class="sync-badge">☁️ 即時雲端同步</div>
  <div class="login-title">Tanita BC-730<br>體組成管理</div>
  <div class="login-sub">登入後資料自動同步至雲端<br>手機、電腦、家人裝置皆可共用</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    使用 Google 帳號登入
  </button>
</div>

<div id="mainApp" style="display:none">
  <header>
    <div><div class="logo-sub">TANITA BC-730</div><div class="logo-main">體組成管理</div></div>
    <div class="user-chip">
      <div class="sync-dot" title="已連線同步"></div>
      <img class="user-avatar" id="userAvatar" src="" alt="">
      <button class="btn btn-ghost" style="padding:6px 12px;font-size:12px" onclick="signOut()">登出</button>
    </div>
  </header>
  <nav>
    <button class="nav-btn active" id="nav-dashboard" onclick="switchNav('dashboard')"><span class="nav-icon">🏠</span>首頁</button>
    <button class="nav-btn" id="nav-analysis" onclick="switchNav('analysis')"><span class="nav-icon">📊</span>分析</button>
    <button class="nav-btn" id="nav-trend" onclick="switchNav('trend')"><span class="nav-icon">📈</span>趨勢</button>
    <button class="nav-btn" id="nav-compare" onclick="switchNav('compare')"><span class="nav-icon">👥</span>對比</button>
    <button class="nav-btn" id="nav-data" onclick="switchNav('data')"><span class="nav-icon">💾</span>資料</button>
  </nav>
  <div class="view active" id="view-dashboard"><div class="member-chips" id="memberChips"></div><div id="dashContent"></div></div>
  <div class="view" id="view-analysis"><div style="font-size:18px;font-weight:700;margin-bottom:16px">健康分析</div><div class="member-chips" id="analysisChips"></div><div id="analysisContent"></div></div>
  <div class="view" id="view-trend">
    <div style="font-size:18px;font-weight:700;margin-bottom:16px" id="trendTitle">趨勢圖</div>
    <div class="member-chips" id="trendChips"></div>
    <div class="metric-pills" id="metricPills"></div>
    <div id="compareToggleWrap" style="margin-bottom:12px;display:none"><label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#aaa;cursor:pointer"><input type="checkbox" id="showAllToggle" onchange="renderTrend()" style="accent-color:var(--teal)"> 顯示所有成員對比</label></div>
    <div class="card" id="trendCard"><div class="no-trend">選擇成員後顯示趨勢圖</div></div>
  </div>
  <div class="view" id="view-compare"><div style="font-size:18px;font-weight:700;margin-bottom:6px">成員對比</div><div style="font-size:13px;color:var(--muted);margin-bottom:16px">選擇兩位成員，比較同一指標</div><div id="compareContent"></div></div>
  <div class="view" id="view-data">
    <div style="font-size:18px;font-weight:700;margin-bottom:16px">資料管理</div>
    <div class="mgmt-item"><div class="mgmt-info"><div class="mgmt-title">📥 匯出 CSV</div><div class="mgmt-desc">下載所有量測紀錄為試算表格式</div></div><div style="display:flex;gap:8px"><button class="btn btn-teal" onclick="exportCSV('current')">目前成員</button><button class="btn btn-ghost" onclick="exportCSV('all')">全部成員</button></div></div>
    <div class="mgmt-item"><div class="mgmt-info"><div class="mgmt-title">💾 備份資料</div><div class="mgmt-desc">匯出 JSON 備份檔</div></div><button class="btn btn-purple" onclick="exportJSON()">匯出備份</button></div>
    <div class="mgmt-item"><div class="mgmt-info"><div class="mgmt-title">📤 還原資料</div><div class="mgmt-desc">從備份 JSON 合併至雲端</div></div><button class="btn btn-yellow" onclick="document.getElementById('importFile').click()">選擇檔案</button><input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)"></div>
    <div class="mgmt-item"><div class="mgmt-info"><div class="mgmt-title">🎯 目標設定</div><div class="mgmt-desc">為每位成員設定體重、體脂率目標</div></div><button class="btn btn-green" onclick="goTargets()">設定</button></div>
    <div class="mgmt-item" style="border-color:rgba(255,107,107,0.2)"><div class="mgmt-info"><div class="mgmt-title" style="color:var(--red)">🗑 清除所有資料</div><div class="mgmt-desc">從雲端永久刪除所有資料</div></div><button class="btn btn-red" onclick="clearAll()">清除</button></div>
    <div style="margin-top:20px;padding:16px;background:rgba(255,255,255,0.02);border-radius:14px;border:1px solid var(--border)"><div style="font-size:12px;color:var(--muted);margin-bottom:8px">雲端同步狀態</div><div id="storageInfo" style="font-size:13px;color:#aaa"></div></div>
  </div>
  <div class="view" id="view-records">
    <div class="back-bar" style="justify-content:space-between"><div style="display:flex;align-items:center;gap:12px"><button class="btn btn-ghost" onclick="switchNav('dashboard')">← 返回</button><h2 id="recordsTitle">量測紀錄</h2></div><button class="btn btn-teal" onclick="goAddRecord()">＋ 新增</button></div>
    <div id="recordsList"></div>
  </div>
  <div class="view" id="view-addRecord">
    <div class="back-bar"><button class="btn btn-ghost" onclick="showSubView('records')">← 返回</button><h2>新增量測</h2></div>
    <div class="field"><label>日期</label><input type="date" id="recDate"></div>
    <div class="section-label">主要指數</div>
    <div id="mainFields"></div>
    <div style="margin-top:14px"><button class="btn btn-full btn-primary" onclick="saveRecord()">儲存紀錄</button></div>
  </div>
  <div class="view" id="view-addMember">
    <div class="back-bar"><button class="btn btn-ghost" onclick="switchNav('dashboard')">← 返回</button><h2 id="memberFormTitle">新增成員</h2></div>
    <div class="field"><label>姓名</label><input type="text" id="mName" placeholder="請輸入姓名"></div>
    <div class="field"><label>性別</label><div class="gender-toggle"><button class="gender-btn active" id="gBtn男" onclick="selectGender('男')">男</button><button class="gender-btn" id="gBtn女" onclick="selectGender('女')">女</button></div></div>
    <div class="field"><label>出生年</label><input type="number" id="mBirth" value="1990" min="1920" max="2020"></div>
    <div class="field"><label>身高 (cm)</label><input type="number" id="mHeight" value="170" min="50" max="250"></div>
    <div class="btn-row"><button class="btn btn-full btn-primary" id="saveMemberBtn" onclick="saveMember()">建立成員</button><button class="btn btn-full btn-danger" id="deleteMemberBtn" onclick="deleteMember()" style="display:none;flex:0 0 auto;width:auto;padding:14px 20px">刪除</button></div>
  </div>
  <div class="view" id="view-targets">
    <div class="back-bar"><button class="btn btn-ghost" onclick="showSubView('data')">← 返回</button><h2>目標設定</h2></div>
    <div id="targetsContent"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     Firebase SDK
════════════════════════════════════════════════════════ -->
<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged,
         signOut as fbSignOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, collection, setDoc, getDocs,
         deleteDoc, onSnapshot, writeBatch }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ═══════════════════════════════════════════════════════
//  🔧 步驟一：把下面換成你的 Firebase 專案設定
//     Firebase Console → 專案設定 → 你的應用程式 → 設定物件
// ═══════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};
// ═══════════════════════════════════════════════════════

const fbApp  = initializeApp(firebaseConfig);
const auth   = getAuth(fbApp);
const db     = getFirestore(fbApp);

let unsubListeners = [];

// ── Firestore path helpers ──
const membersCol = uid => collection(db,'users',uid,'members');
const recordsCol = (uid,mid) => collection(db,'users',uid,'members',mid,'records');
const userDocRef = uid => doc(db,'users',uid);

// ── Expose to global scope ──
window.signInWithGoogle = async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e) { console.error(e); alert('登入失敗，請再試一次'); }
};
window.signOut = async () => {
  if(!confirm('確定要登出？')) return;
  unsubListeners.forEach(u=>u());
  unsubListeners=[];
  await fbSignOut(auth);
};

// ── Auth state ──
onAuthStateChanged(auth, user => {
  document.getElementById('loadingOverlay').style.display='none';
  if(user){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
    document.getElementById('userAvatar').src = user.photoURL||'';
    initListeners(user.uid);
    switchNav('dashboard');
  } else {
    unsubListeners.forEach(u=>u()); unsubListeners=[];
    state={members:[],records:{},targets:{}};
    document.getElementById('mainApp').style.display='none';
    document.getElementById('loginScreen').style.display='flex';
  }
});

function initListeners(uid){
  unsubListeners.forEach(u=>u()); unsubListeners=[];

  // Members (realtime)
  const unsubM = onSnapshot(membersCol(uid), snap => {
    state.members = snap.docs
      .map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));

    // Records per member (realtime)
    state.members.forEach(m => {
      const unsubR = onSnapshot(recordsCol(uid,m.id), rSnap => {
        state.records[m.id] = rSnap.docs
          .map(d=>({id:d.id,...d.data()}))
          .sort((a,b)=>a.date.localeCompare(b.date));
        refreshView();
      });
      unsubListeners.push(unsubR);
    });
    refreshView();
  });
  unsubListeners.push(unsubM);

  // Targets (realtime)
  const unsubT = onSnapshot(userDocRef(uid), snap => {
    state.targets = snap.exists() ? (snap.data().targets||{}) : {};
    refreshView();
  });
  unsubListeners.push(unsubT);
}

// ── DB write helpers (exposed globally) ──
window._db = {
  async saveMember(m){
    const uid=auth.currentUser.uid;
    await setDoc(doc(membersCol(uid),m.id),{name:m.name,gender:m.gender,birthYear:m.birthYear,height:m.height,createdAt:m.createdAt||Date.now()});
  },
  async deleteMember(mid){
    const uid=auth.currentUser.uid;
    const rSnap=await getDocs(recordsCol(uid,mid));
    const batch=writeBatch(db);
    rSnap.forEach(r=>batch.delete(r.ref));
    batch.delete(doc(membersCol(uid),mid));
    await batch.commit();
  },
  async saveRecord(mid,rec){
    const uid=auth.currentUser.uid;
    const{id,...data}=rec;
    await setDoc(doc(recordsCol(uid,mid),id),data);
  },
  async deleteRecord(mid,rid){
    const uid=auth.currentUser.uid;
    await deleteDoc(doc(recordsCol(uid,mid),rid));
  },
  async saveTargets(targets){
    const uid=auth.currentUser.uid;
    await setDoc(userDocRef(uid),{targets},{merge:true});
  },
  async clearAll(){
    const uid=auth.currentUser.uid;
    const mSnap=await getDocs(membersCol(uid));
    const batch=writeBatch(db);
    for(const m of mSnap.docs){
      const rSnap=await getDocs(recordsCol(uid,m.id));
      rSnap.forEach(r=>batch.delete(r.ref));
      batch.delete(m.ref);
    }
    batch.delete(userDocRef(uid));
    await batch.commit();
  }
};
</script>

<!-- ═══════════════════════════════════════════════════════
     App Logic

<script>
const METRICS=[
  {key:"weight",     label:"體重",     unit:"kg",   color:"#4ECDC4",normal:[50,80],   goalable:true },
  {key:"bmi",        label:"BMI",      unit:"",     color:"#FFE66D",normal:[18.5,24.9],goalable:false},
  {key:"bodyFat",    label:"體脂率",   unit:"%",    color:"#FF6B6B",normal:[10,25],   goalable:true },
  {key:"muscleMass", label:"肌肉量",   unit:"kg",   color:"#A8E6CF",normal:[30,60],   goalable:true },
  {key:"boneMass",   label:"骨量",     unit:"kg",   color:"#C3B1E1",normal:[2,3.5],   goalable:false},
  {key:"visceralFat",label:"內臟脂肪",unit:"級",   color:"#FFB347",normal:[1,9],      goalable:false},
  {key:"bmr",        label:"基礎代謝",unit:"kcal", color:"#87CEEB",normal:[1200,2000],goalable:false},
  {key:"bodyAge",    label:"身體年齡",unit:"歲",   color:"#DDA0DD",normal:[20,40],    goalable:false},
  {key:"waterContent",label:"身體水分",unit:"%",  color:"#00CED1",normal:[45,65],    goalable:false},
];

let state={members:[],records:{},targets:{}};
let currentMemberId=null,currentGender='男',editingMemberId=null;
let activeMetric='weight',compareA=null,compareB=null;
let trendChart=null,compareChart=null,currentNav='dashboard';

const uid=()=>Math.random().toString(36).slice(2,10);
const currentMember=()=>state.members.find(m=>m.id===currentMemberId)||null;
const getRecords=id=>(state.records[id]||[]).sort((a,b)=>a.date.localeCompare(b.date));
const currentRecords=()=>getRecords(currentMemberId);

function refreshView(){
  if(currentNav==='dashboard') renderDashboard();
  else if(currentNav==='analysis') renderAnalysis();
  else if(currentNav==='trend') renderTrend();
  else if(currentNav==='compare') renderCompare();
  updateStorageInfo();
}

window.switchNav=function(name){
  currentNav=name;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const v=document.getElementById('view-'+name);if(v)v.classList.add('active');
  const n=document.getElementById('nav-'+name);if(n)n.classList.add('active');

};
window.showSubView=function(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
};

// ── CHIPS ──
function renderChips(elId,onClick){
  const el=document.getElementById(elId);if(!el)return;
  el.innerHTML=state.members.map(m=>`<button class="chip ${m.id===currentMemberId?'active':''}" onclick="${onClick}('${m.id}')">${m.name}</button>`).join('')
    +`<button class="chip add" onclick="goAddMember()">+ 新增</button>`;
}

// ── DASHBOARD ──
window.renderDashboard=function(){
  renderChips('memberChips','selectMember');
  const el=document.getElementById('dashContent');if(!el)return;
  if(!currentMemberId){
    el.innerHTML=state.members.length===0
      ?`<div class="empty"><div style="font-size:56px;margin-bottom:12px">🧬</div><div style="font-size:20px;font-weight:700;margin-bottom:8px">開始記錄健康數據</div><p>新增家庭成員，追蹤每次 Tanita 的量測結果</p><button class="btn btn-full btn-primary" style="max-width:260px;margin:0 auto" onclick="goAddMember()">＋ 新增第一位成員</button></div>`
      :`<div class="empty"><p>請選擇上方成員</p></div>`;
    return;
  }
  const recs=currentRecords(),latest=recs.length?recs[recs.length-1]:null,prev=recs.length>1?recs[recs.length-2]:null;
  const targets=state.targets[currentMemberId]||{};let html='';
  if(!latest){
    html=`<div class="card" style="text-align:center;padding:40px;border-style:dashed;border-color:rgba(78,205,196,0.3)"><div style="font-size:40px;margin-bottom:10px">📊</div><div style="color:var(--muted);font-size:14px">尚無量測紀錄</div></div>`;
  }else{
    const sc=calcScore(latest),scC=sc>=80?'#4ECDC4':sc>=60?'#FFE66D':'#FF6B6B',scL=sc>=80?'優良 💪':sc>=60?'尚可 📈':'需改善 ⚠️';
    html+=`<div class="card"><div class="top-row"><div><div style="font-size:13px;color:var(--muted)">最新紀錄</div><div style="font-size:12px;color:var(--teal)">${latest.date}</div></div><div class="actions"><button class="btn btn-teal" onclick="goViewRecords()">紀錄</button><button class="btn btn-ghost" onclick="goEditMember()">✏️</button></div></div><div class="score-ring"><div><div class="score-num" style="color:${scC}">${sc}</div><div class="score-label">健康評分 / 100</div></div><div><div class="score-desc" style="color:${scC}">${scL}</div><div style="font-size:12px;color:var(--muted);margin-top:4px">依 BC-730 九項指數</div></div></div></div>`;
    html+=`<div class="card"><div style="font-size:13px;color:var(--muted);margin-bottom:12px">量測數值</div><div class="stat-grid">${METRICS.map(m=>{const v=latest[m.key],pv=prev?.[m.key],d=v&&pv?(parseFloat(v)-parseFloat(pv)):null,ds=d!=null?`<div class="stat-delta" style="color:${d>0?'#FF6B6B':d<0?'#4ECDC4':'#666'}">${d>0?'▲':'▼'} ${Math.abs(d).toFixed(1)}${m.unit}</div>`:'',gs=targets[m.key]?`<div style="font-size:10px;color:#666;margin-top:2px">目標 ${targets[m.key]}${m.unit}</div>`:'';return`<div class="stat-cell" style="border:1px solid ${m.color}22"><div class="stat-label">${m.label}</div><div class="stat-value" style="color:${m.color}">${v||'—'}<span class="stat-unit">${m.unit}</span></div>${ds}${gs}</div>`;}).join('')}</div></div>`;
    const gks=METRICS.filter(m=>m.goalable&&targets[m.key]&&latest[m.key]);
    if(gks.length){html+=`<div class="card"><div style="font-size:13px;color:var(--muted);margin-bottom:12px">目標進度</div>${gks.map(m=>{const c=parseFloat(latest[m.key]),g=parseFloat(targets[m.key]),f=getRecords(currentMemberId).find(r=>r[m.key]),s=f?parseFloat(f[m.key]):c,p=Math.min(100,Math.max(0,Math.abs(c-s)/Math.abs(g-s||1)*100));return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#aaa">${m.label}</span><span style="color:${m.color}">${c}${m.unit} → 目標 ${g}${m.unit}</span></div><div style="height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden"><div style="width:${p}%;height:100%;background:${m.color};border-radius:4px"></div></div></div>`;}).join('')}</div>`;}
  }
  html+=`<button class="btn btn-full btn-primary" onclick="goAddRecord()">＋ 新增量測</button>`;
  el.innerHTML=html;
};
window.selectMember=function(id){currentMemberId=id;renderDashboard();};
function calcScore(rec){let t=0,c=0;[{key:'bmi',lo:18.5,hi:24.9},{key:'bodyFat',lo:10,hi:25},{key:'visceralFat',lo:1,hi:9},{key:'waterContent',lo:45,hi:65}].forEach(x=>{const v=parseFloat(rec[x.key]);if(!v)return;t+=(v>=x.lo&&v<=x.hi)?100:(v>=x.lo*0.9&&v<=x.hi*1.1)?60:20;c++;});return c?Math.round(t/c):0;}

// ── ANALYSIS ──
window.renderAnalysis=function(){
  renderChips('analysisChips','selectMemberA');
  const el=document.getElementById('analysisContent');if(!el)return;
  if(!currentMemberId){el.innerHTML=`<div class="empty"><p>請選擇成員</p></div>`;return;}
  const recs=currentRecords();if(!recs.length){el.innerHTML=`<div class="empty"><p>尚無量測紀錄</p></div>`;return;}
  const latest=recs[recs.length-1],prev=recs.length>1?recs[recs.length-2]:null;
  let out=`<div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:12px">指數評估</div>${METRICS.map(m=>{const v=parseFloat(latest[m.key]);if(!v||!m.normal)return'';const[lo,hi]=m.normal,st=v<lo?'偏低':v>hi?'偏高':'正常',bc=st==='正常'?'badge-ok':st==='偏低'?'badge-warn':'badge-bad',pct=Math.min(100,Math.max(0,(v-lo*0.8)/((hi*1.2-lo*0.8))*100)),d=prev&&prev[m.key]?(parseFloat(latest[m.key])-parseFloat(prev[m.key])).toFixed(1):null;return`<div class="analysis-row"><div class="analysis-label">${m.label}</div><div class="analysis-bar-wrap"><div style="height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;position:relative"><div style="position:absolute;left:${(lo-lo*0.8)/((hi*1.2-lo*0.8))*100}%;width:${(hi-lo)/((hi*1.2-lo*0.8))*100}%;height:100%;background:rgba(78,205,196,0.15)"></div><div style="position:absolute;left:${pct}%;transform:translateX(-50%);width:6px;height:8px;background:${m.color};border-radius:2px"></div></div><div style="display:flex;justify-content:space-between;font-size:10px;color:#444;margin-top:2px"><span>${lo}</span><span>${hi}</span></div></div><div class="analysis-val" style="color:${m.color}">${v}${m.unit}</div><span class="badge ${bc}">${st}</span>${d?`<span style="font-size:11px;color:${parseFloat(d)>0?'#FF6B6B':'#4ECDC4'};margin-left:4px">${parseFloat(d)>0?'▲':'▼'}${Math.abs(parseFloat(d))}</span>`:''}</div>`;}).join('')}</div>`;
  if(recs.length>1){const first=recs[0];out+=`<div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:12px">累計變化（初次 vs 最新）</div>${METRICS.filter(m=>first[m.key]&&latest[m.key]).map(m=>{const df=(parseFloat(latest[m.key])-parseFloat(first[m.key])).toFixed(1);return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px;color:#aaa">${m.label}</span><span style="font-size:14px;font-weight:600;color:${parseFloat(df)>0?'#FF6B6B':'#4ECDC4'}">${parseFloat(df)>0?'+':''}${df} ${m.unit}</span></div>`;}).join('')}</div>`;}
  el.innerHTML=out;
};
window.selectMemberA=function(id){currentMemberId=id;renderAnalysis();};

// ── TREND ──
window.renderTrend=function(){
  renderChips('trendChips','selectMemberT');
  document.getElementById('trendTitle').textContent=currentMember()?(currentMember().name+' 趨勢圖'):'趨勢圖';
  document.getElementById('compareToggleWrap').style.display=state.members.length>1?'block':'none';
  document.getElementById('metricPills').innerHTML=METRICS.map(m=>`<button class="metric-pill ${activeMetric===m.key?'active':''}" style="${activeMetric===m.key?'background:'+m.color+';color:#111':''}" onclick="setMetric('${m.key}')">${m.label}</button>`).join('');
  const mi=METRICS.find(x=>x.key===activeMetric),card=document.getElementById('trendCard'),showAll=document.getElementById('showAllToggle')?.checked&&state.members.length>1;
  if(showAll){
    const COLS=['#4ECDC4','#FFE66D','#FF6B6B','#A8E6CF','#DDA0DD'];
    const datasets=state.members.map((m,i)=>{const recs=getRecords(m.id).filter(r=>r[activeMetric]);return{label:m.name,data:recs.map(r=>({x:r.date.slice(5),y:parseFloat(r[activeMetric])})),borderColor:COLS[i%5],backgroundColor:COLS[i%5]+'22',borderWidth:2,pointRadius:4,tension:0.3,fill:false};}).filter(d=>d.data.length);
    if(!datasets.length){card.innerHTML=`<div class="no-trend">尚無資料</div>`;return;}
    card.innerHTML=`<div style="font-size:14px;font-weight:600;color:${mi.color};margin-bottom:8px">${mi.label} 成員對比</div><div class="chart-wrap"><canvas id="trendCanvas"></canvas></div>`;
    buildChart({datasets},mi);
  }else{
    if(!currentMemberId){card.innerHTML=`<div class="no-trend">請先選擇成員</div>`;return;}
    const recs=currentRecords().filter(r=>r[activeMetric]);
    if(recs.length<2){if(trendChart){trendChart.destroy();trendChart=null;}card.innerHTML=`<div class="no-trend">至少需要 2 筆「${mi.label}」紀錄</div>`;return;}
    const labels=recs.map(r=>r.date.slice(5)),values=recs.map(r=>parseFloat(r[activeMetric])),gv=(state.targets[currentMemberId]||{})[activeMetric];
    card.innerHTML=`<div style="font-size:14px;font-weight:600;color:${mi.color};margin-bottom:4px">${mi.label}${mi.unit?' ('+mi.unit+')':''}</div><div class="chart-wrap"><canvas id="trendCanvas"></canvas></div><div class="legend">${mi.normal?`<span style="color:#4ECDC4">─ 正常下限 ${mi.normal[0]}</span><span style="color:#FF6B6B">─ 正常上限 ${mi.normal[1]}</span>`:''} ${gv?`<span style="color:#FFE66D">─ 目標 ${gv}</span>`:''}</div>`;
    buildChart({labels,datasets:[{label:mi.label,data:values,borderColor:mi.color,backgroundColor:mi.color+'22',borderWidth:2.5,pointBackgroundColor:mi.color,pointRadius:5,pointHoverRadius:7,tension:0.3,fill:true}]},mi,gv);
  }
};
window.selectMemberT=function(id){currentMemberId=id;renderTrend();};
window.setMetric=function(k){activeMetric=k;renderTrend();};
function buildChart({labels,datasets},mi,gv){
  if(trendChart){trendChart.destroy();trendChart=null;}
  const refPlugin={id:'refs',afterDraw(chart){const{ctx,chartArea:{left,right},scales:{y}}=chart;const ls=[];if(mi.normal){ls.push({val:mi.normal[0],color:'rgba(78,205,196,0.4)'});ls.push({val:mi.normal[1],color:'rgba(255,107,107,0.4)'});}if(gv)ls.push({val:parseFloat(gv),color:'rgba(255,230,109,0.6)'});ls.forEach(l=>{try{const yp=y.getPixelForValue(l.val);ctx.save();ctx.strokeStyle=l.color;ctx.setLineDash([5,5]);ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(left,yp);ctx.lineTo(right,yp);ctx.stroke();ctx.restore();}catch{}});}};
  trendChart=new Chart(document.getElementById('trendCanvas'),{type:'line',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:datasets.length>1,labels:{color:'#888',font:{size:11}}},tooltip:{backgroundColor:'rgba(10,15,30,0.95)',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#888',bodyFont:{size:15,weight:'700'},callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.raw+' '+mi.unit}}},scales:{x:{ticks:{color:'#555',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#555',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}}}},plugins:[refPlugin]});
}

// ── COMPARE ──
window.renderCompare=function(){
  const el=document.getElementById('compareContent');if(!el)return;
  if(state.members.length<2){el.innerHTML=`<div class="empty"><p>至少需要 2 位成員才能對比</p></div>`;return;}
  let html=`<div style="font-size:13px;color:var(--muted);margin-bottom:8px">選擇成員 A <span style="color:var(--teal)">●</span></div><div class="compare-grid">${state.members.map(m=>`<button class="compare-member ${compareA===m.id?'sel-a':''}" onclick="compareA='${m.id}';renderCompare()">${m.name}</button>`).join('')}</div><div style="font-size:13px;color:var(--muted);margin:10px 0 8px">選擇成員 B <span style="color:var(--yellow)">●</span></div><div class="compare-grid">${state.members.map(m=>`<button class="compare-member ${compareB===m.id?'sel-b':''}" onclick="compareB='${m.id}';renderCompare()">${m.name}</button>`).join('')}</div>`;
  if(compareA&&compareB&&compareA!==compareB){
    const mA=state.members.find(m=>m.id===compareA),mB=state.members.find(m=>m.id===compareB),lA=getRecords(compareA).slice(-1)[0],lB=getRecords(compareB).slice(-1)[0];
    html+=`<div class="card" style="margin-top:14px"><div style="display:flex;justify-content:space-between;margin-bottom:14px"><div style="font-size:14px;font-weight:700;color:var(--teal)">${mA.name}</div><div style="font-size:14px;font-weight:700;color:var(--yellow)">${mB.name}</div></div>${METRICS.map(m=>{const vA=lA?parseFloat(lA[m.key]):null,vB=lB?parseFloat(lB[m.key]):null;if(!vA&&!vB)return'';const mx=Math.max(vA||0,vB||0)||1;return`<div style="margin-bottom:12px"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">${m.label}${m.unit?' ('+m.unit+')':''}</div><div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;font-weight:600;color:var(--teal);width:44px;text-align:right">${vA??'—'}</span><div style="flex:1"><div style="height:6px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;display:flex"><div style="width:${vA?vA/mx*50:0}%;background:var(--teal);border-radius:4px 0 0 4px;margin-left:auto"></div><div style="width:${vB?vB/mx*50:0}%;background:var(--yellow);border-radius:0 4px 4px 0"></div></div></div><span style="font-size:12px;font-weight:600;color:var(--yellow);width:44px">${vB??'—'}</span></div></div>`;}).join('')}</div>`;
  }
  el.innerHTML=html;
};

// ── DATA ──
window.renderData=function(){updateStorageInfo();};
window.updateStorageInfo=function(){const el=document.getElementById('storageInfo');if(!el)return;const tot=Object.values(state.records).reduce((s,r)=>s+r.length,0);el.innerHTML=`✅ 已連線雲端同步　|　成員：${state.members.length} 位　|　紀錄：${tot} 筆`;};
window.exportCSV=function(mode){const ms=mode==='current'&&currentMemberId?[currentMember()]:state.members,ks=METRICS.map(m=>m.key),rows=[['姓名','日期',...METRICS.map(m=>m.label+'('+m.unit+')')].join(',')];ms.forEach(m=>{getRecords(m.id).forEach(r=>{rows.push([m.name,r.date,...ks.map(k=>r[k]||'')].join(','));});});dl(rows.join('\n'),'tanita_records.csv','text/csv');};
window.exportJSON=function(){dl(JSON.stringify(state,null,2),'tanita_backup.json','application/json');};
window.importJSON=async function(e){const f=e.target.files[0];if(!f)return;const reader=new FileReader();reader.onload=async ev=>{try{const imp=JSON.parse(ev.target.result);if(!imp.members||!imp.records)throw 0;if(!confirm('確定要將備份資料合併至雲端？'))return;for(const m of imp.members){await _db.saveMember(m);for(const r of(imp.records[m.id]||[])){await _db.saveRecord(m.id,r);}}if(imp.targets)await _db.saveTargets(imp.targets);alert('匯入成功！');}catch{alert('檔案格式錯誤');}e.target.value='';};reader.readAsText(f);};
window.clearAll=async function(){if(!confirm('確定要從雲端永久刪除所有資料？此動作無法復原！'))return;await _db.clearAll();currentMemberId=null;compareA=null;compareB=null;switchNav('dashboard');};
function dl(c,n,t){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:t}));a.download=n;a.click();}

// ── TARGETS ──
window.goTargets=function(){showSubView('targets');renderTargets();};
window.renderTargets=function(){const el=document.getElementById('targetsContent');if(!el)return;if(!state.members.length){el.innerHTML=`<div class="empty"><p>尚無成員</p></div>`;return;}el.innerHTML=state.members.map(m=>`<div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:12px">${m.name}</div>${METRICS.filter(x=>x.goalable).map(x=>`<div class="target-row"><div class="target-key">${x.label}</div><input class="target-input" type="number" step="0.1" placeholder="目標 ${x.unit}" value="${state.targets[m.id]?.[x.key]||''}" id="tgt_${m.id}_${x.key}"><span style="font-size:12px;color:var(--muted);margin-left:4px">${x.unit}</span></div>`).join('')}<button class="btn btn-teal" style="margin-top:8px;width:100%" onclick="saveTargets('${m.id}')">儲存目標</button></div>`).join('');};
window.saveTargets=async function(mid){if(!state.targets[mid])state.targets[mid]={};METRICS.filter(m=>m.goalable).forEach(m=>{const v=document.getElementById(`tgt_${mid}_${m.key}`)?.value;if(v)state.targets[mid][m.key]=v;else delete state.targets[mid][m.key];});await _db.saveTargets(state.targets);alert('目標已儲存！');};

// ── RECORDS ──
window.goViewRecords=function(){document.getElementById('recordsTitle').textContent=(currentMember()?.name||'')+'的紀錄';showSubView('records');renderRecords();};
function renderRecords(){const recs=[...currentRecords()].reverse(),el=document.getElementById('recordsList');if(!recs.length){el.innerHTML=`<div class="empty"><p>尚無量測紀錄</p></div>`;return;}el.innerHTML=recs.map((rec,i)=>{const prev=i<recs.length-1?recs[i+1]:null;return`<div class="record-item"><div class="record-header"><div class="record-date">${rec.date}</div><button class="btn btn-red" onclick="deleteRecord('${rec.id}')">🗑</button></div><div class="record-grid">${METRICS.filter(m=>rec[m.key]).map(m=>{const d=prev&&prev[m.key]?(parseFloat(rec[m.key])-parseFloat(prev[m.key])).toFixed(1):null;return`<div class="record-metric"><span>${m.label}：</span><strong style="color:${m.color}">${rec[m.key]}${m.unit}</strong>${d?` <span style="font-size:10px;color:${parseFloat(d)>0?'#FF6B6B':'#4ECDC4'}">${parseFloat(d)>0?'▲':'▼'}${Math.abs(parseFloat(d))}</span>`:''}</div>`;}).join('')}</div></div>`;}).join('');}
window.deleteRecord=async function(rid){if(!confirm('確定刪除此紀錄？'))return;await _db.deleteRecord(currentMemberId,rid);};

// ── ADD RECORD ──
window.goAddRecord=function(){document.getElementById('recDate').value=new Date().toISOString().split('T')[0];document.getElementById('mainFields').innerHTML=METRICS.map(m=>`<div class="field"><label>${m.label}${m.unit?' ('+m.unit+')':''}</label><input type="number" id="rec_${m.key}" placeholder="輸入${m.label}" step="0.1" style="border-color:${m.color}33"></div>`).join('');showSubView('addRecord');};
window.saveRecord=async function(){const rec={id:uid(),date:document.getElementById('recDate').value};METRICS.forEach(m=>{const v=document.getElementById('rec_'+m.key)?.value;if(v)rec[m.key]=v;});await _db.saveRecord(currentMemberId,rec);goViewRecords();};

// ── MEMBER FORMS ──
window.goAddMember=function(){editingMemberId=null;currentGender='男';document.getElementById('mName').value='';document.getElementById('mBirth').value='1990';document.getElementById('mHeight').value='170';document.getElementById('memberFormTitle').textContent='新增成員';document.getElementById('saveMemberBtn').textContent='建立成員';document.getElementById('deleteMemberBtn').style.display='none';selectGender('男');showSubView('addMember');};
window.goEditMember=function(){const m=currentMember();if(!m)return;editingMemberId=m.id;currentGender=m.gender;document.getElementById('mName').value=m.name;document.getElementById('mBirth').value=m.birthYear;document.getElementById('mHeight').value=m.height;document.getElementById('memberFormTitle').textContent='編輯成員';document.getElementById('saveMemberBtn').textContent='儲存變更';document.getElementById('deleteMemberBtn').style.display='block';selectGender(m.gender);showSubView('addMember');};
window.selectGender=function(g){currentGender=g;document.querySelectorAll('.gender-btn').forEach(b=>b.classList.remove('active'));document.getElementById('gBtn'+g).classList.add('active');};
window.saveMember=async function(){const name=document.getElementById('mName').value.trim();if(!name){alert('請輸入姓名');return;}const m={id:editingMemberId||uid(),name,gender:currentGender,birthYear:+document.getElementById('mBirth').value,height:+document.getElementById('mHeight').value,createdAt:Date.now()};await _db.saveMember(m);if(!editingMemberId)currentMemberId=m.id;switchNav('dashboard');};
window.deleteMember=async function(){if(!editingMemberId)return;if(!confirm('確定要刪除此成員及所有紀錄？'))return;await _db.deleteMember(editingMemberId);if(currentMemberId===editingMemberId)currentMemberId=null;editingMemberId=null;switchNav('dashboard');};
</script>
</body>
